<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brewmaster: Coffee Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --espresso: #2C1B12;
            --bean: #4E342E;
            --crema: #D7CCC8;
            --latte: #F5F5DC;
            --accent: #FF7043;
            --steam: rgba(255, 255, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--latte);
            color: var(--espresso);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Left Side: The Brewing Station --- */
        #main-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #efebe9 0%, #d7ccc8 100%);
            position: relative;
            border-right: 4px solid var(--espresso);
        }

        #stats-panel {
            position: absolute;
            top: 20px;
            text-align: center;
        }

        #coffee-count {
            font-size: 3rem;
            font-family: 'Playfair Display', serif;
            color: var(--espresso);
        }

        .cup-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .cup-container:active { transform: scale(0.95); }

        #cup-svg { width: 250px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }

        /* Temperature Mechanic */
        #temp-gauge {
            width: 200px;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid var(--espresso);
        }

        #temp-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(to right, #2196F3, #FFEB3B, #F44336);
            transition: width 0.3s;
        }

        .temp-label { font-size: 0.8rem; font-weight: 600; margin-top: 5px; }

        /* --- Right Side: The Coffee Shop --- */
        #shop-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--latte);
        }

        h2 { font-family: 'Playfair Display', serif; margin-bottom: 20px; border-bottom: 2px solid var(--espresso); }

        .item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            cursor: pointer;
        }

        .item:hover { transform: translateX(-5px); box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .item.disabled { opacity: 0.5; cursor: not-allowed; }

        .item-info b { display: block; font-size: 1.1rem; }
        .item-info span { font-size: 0.85rem; color: #666; }

        .price { font-weight: 600; color: var(--accent); }

        /* Notifications */
        .click-pop {
            position: absolute;
            color: var(--accent);
            font-weight: 700;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }

        #bonus-tag {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            display: none;
        }
    </style>
</head>
<body>

    <div id="main-area">
        <div id="stats-panel">
            <div id="coffee-count">0 Beans</div>
            <div id="cps-display">0 beans per second</div>
            <div id="bonus-tag">PERFECT TEMP: 2x CLICK!</div>
        </div>

        <div class="cup-container" id="cup">
            <!-- Simple Coffee Cup SVG -->
            <svg id="cup-svg" viewBox="0 0 100 100">
                <path d="M20,30 Q20,80 50,80 Q80,80 80,30 Z" fill="#fff" stroke="#2C1B12" stroke-width="2"/>
                <path d="M25,35 Q25,75 50,75 Q75,75 75,35 Z" fill="#4E342E" />
                <path d="M80,40 Q95,40 95,55 Q95,70 80,70" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
            </svg>
        </div>

        <div id="temp-gauge"><div id="temp-fill"></div></div>
        <div class="temp-label">Temperature: <span id="temp-val">50</span>°C (Ideal: 85-95°C)</div>
    </div>

    <div id="shop-area">
        <h2>Upgrades & Baristas</h2>
        <div id="shop-list">
            <!-- Upgrades will be injected here -->
        </div>
    </div>

    <script>
        // Game State
        let beans = 0;
        let totalBeans = 0;
        let temp = 50;
        let clickValue = 1;
        let autoValue = 0;

        const shopItems = [
            { id: 'barista', name: 'Rookie Barista', cost: 15, baseCps: 1, desc: 'Brewing manually is hard. Let them help.' },
            { id: 'press', name: 'French Press', cost: 100, baseCps: 5, desc: 'Coarse grounds, better flow.' },
            { id: 'espresso_machine', name: 'Vapor-9000', cost: 500, baseCps: 20, desc: 'High pressure, high reward.' },
            { id: 'roastery', name: 'Local Roastery', cost: 2000, baseCps: 80, desc: 'Fresh beans every hour.' },
            { id: 'plantation', name: 'Coffee Plantation', cost: 10000, baseCps: 300, desc: 'Direct from the source.' }
        ];

        let inventory = { barista: 0, press: 0, espresso_machine: 0, roastery: 0, plantation: 0 };

        // DOM Elements
        const cup = document.getElementById('cup');
        const beanDisplay = document.getElementById('coffee-count');
        const cpsDisplay = document.getElementById('cps-display');
        const tempFill = document.getElementById('temp-fill');
        const tempValDisplay = document.getElementById('temp-val');
        const bonusTag = document.getElementById('bonus-tag');
        const shopList = document.getElementById('shop-list');

        // Logic: Click
        cup.addEventListener('mousedown', (e) => {
            let multiplier = (temp >= 85 && temp <= 95) ? 2 : 1;
            let earned = clickValue * multiplier;
            
            beans += earned;
            totalBeans += earned;
            
            // Heat up on click
            temp = Math.min(100, temp + 1.5);
            
            spawnPop(e.pageX, e.pageY, `+${earned}`);
            updateUI();
        });

        // Logic: Passive Temperature Cooling
        setInterval(() => {
            if (temp > 20) temp -= 0.5;
            
            // Passive production
            if (autoValue > 0) {
                beans += (autoValue / 10);
                totalBeans += (autoValue / 10);
            }
            
            updateUI();
        }, 100);

        function updateUI() {
            beanDisplay.innerText = `${Math.floor(beans)} Beans`;
            cpsDisplay.innerText = `${autoValue.toFixed(1)} beans per second`;
            tempFill.style.width = `${temp}%`;
            tempValDisplay.innerText = Math.floor(temp);
            
            // Bonus Highlight
            if (temp >= 85 && temp <= 95) {
                bonusTag.style.display = 'inline-block';
                tempFill.style.background = '#4CAF50';
            } else {
                bonusTag.style.display = 'none';
                tempFill.style.background = 'linear-gradient(to right, #2196F3, #FFEB3B, #F44336)';
            }

            renderShop();
        }

        function renderShop() {
            shopList.innerHTML = '';
            shopItems.forEach(item => {
                const canAfford = beans >= item.cost;
                const div = document.createElement('div');
                div.className = `item ${canAfford ? '' : 'disabled'}`;
                div.innerHTML = `
                    <div class="item-info">
                        <b>${item.name} (${inventory[item.id]})</b>
                        <span>${item.desc}</span>
                    </div>
                    <div class="price">${Math.floor(item.cost)} beans</div>
                `;
                div.onclick = () => buyItem(item);
                shopList.appendChild(div);
            });
        }

        function buyItem(item) {
            if (beans >= item.cost) {
                beans -= item.cost;
                inventory[item.id]++;
                autoValue += item.baseCps;
                item.cost *= 1.15; // Price inflation
                updateUI();
            }
        }

        function spawnPop(x, y, text) {
            const pop = document.createElement('div');
            pop.className = 'click-pop';
            pop.style.left = x + 'px';
            pop.style.top = y + 'px';
            pop.innerText = text;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 1000);
        }

        // Initialize
        renderShop();
    </script>
</body>
</html>
