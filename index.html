<!DOCTYPE html>
<html>
<head>
    <title>Coffee Shop Tycoon</title>
    <style>
        /* This is your CSS (Style) */
        body {
            background-color: #f5f5dc;
            color: #4b3621;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        #game-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            background-color: #6f4e37;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #4b3621; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>☕ Coffee Shop Tycoon</h1>
        <h2 id="coffee-display">Cups: 0</h2>
        <p id="barista-display">Baristas: 0</p>
        
        <button id="brew-btn">Brew Coffee</button>
        <br><br>
        <button id="hire-btn">Hire Barista (Cost: 15)</button>
    </div>

    <script>
        /* This is your JavaScript (Logic) */
        let coffee = 0;
        let baristas = 0;
        let baristaCost = 15;

        const coffeeDisplay = document.getElementById('coffee-display');
        const baristaDisplay = document.getElementById('barista-display');
        const brewBtn = document.getElementById('brew-btn');
        const hireBtn = document.getElementById('hire-btn');

        brewBtn.addEventListener('click', () => {
            coffee++;
            updateUI();
        });

        hireBtn.addEventListener('click', () => {
            if (coffee >= baristaCost) {
                coffee -= baristaCost;
                baristas++;
                baristaCost = Math.floor(baristaCost * 1.5);
                hireBtn.innerText = `Hire Barista (Cost: ${baristaCost})`;
                updateUI();
            }
        });

        function updateUI() {
            coffeeDisplay.innerText = `Cups: ${Math.floor(coffee)}`;
            baristaDisplay.innerText = `Baristas: ${baristas}`;
        }

        setInterval(() => {
            if (baristas > 0) {
                coffee += (baristas * 1);
                updateUI();
            }
        }, 1000);
    </script>
</body>
</html>
