<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idle Tycoon</title>
    <style>
        :root { --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; user-select: none; }
        .container { max-width: 400px; margin: 0 auto; position: relative; }

        /* Settings Modal */
        #settings-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            z-index: 1000; padding: 20px; box-sizing: border-box; align-items: center; justify-content: center;
            display: flex; opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        #settings-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: var(--panel); padding: 25px; border-radius: 20px; text-align: left; 
            border: 2px solid var(--accent); width: 90%; transform: translateY(50px); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #settings-overlay.active .modal-content { transform: translateY(0); }

        /* Main UI */
        .btn-main { background-color: var(--accent); color: var(--bg); padding: 20px; width: 100%; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; margin-bottom: 20px; }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }
        
        /* Upgrades */
        .upgrade-card { 
            width: 100%; padding: 14px; margin-bottom: 12px; background: #0f3460; 
            color: white; border-radius: 8px; cursor: pointer; position: relative; 
            overflow: hidden; text-align: left; display: flex; justify-content: space-between;
            border: 1px solid #1a1a2e;
        }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 6px; background-color: var(--accent); width: 0%; transition: width 0.3s ease; }
        
        /* Dashboard */
        .dashboard { background: rgba(15, 52, 96, 0.6); border-radius: 12px; padding: 15px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Idle Tycoon</h1>
        
        <!-- Settings Button -->
        <div onclick="toggleSettings()" style="background:#2c3e50; color:var(--accent); padding:10px; border-radius:8px; cursor:pointer; margin-bottom:15px; font-weight:bold;">⚙️ SETTINGS</div>
        
        <!-- Stats Display -->
        <div style="background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
            <div id="money" style="font-size: 32px; color: var(--accent);">$0</div>
            <div id="mps" style="font-size: 16px; margin-top: 5px;">Income: 0/sec</div>
        </div>
        
        <div class="btn-main" onclick="clickMoney(event)">MINE MONEY</div>

        <!-- Buy Max Section -->
        <div style="margin-bottom: 10px; text-align: right; color: var(--accent);">
            <label style="font-size: 14px; cursor: pointer;">
                <input type="checkbox" id="buyMaxToggle"> Buy Max
            </label>
        </div>

        <!-- Shop -->
        <div id="shop">
            <div class="upgrade-card" onclick="buyUpgrade('intern')">
                <span>Intern</span> <span id="cost-intern">$10</span>
                <div class="progress-bar" id="bar-intern"></div>
            </div>
            <div class="upgrade-card" onclick="buyUpgrade('auto')">
                <span>Auto-Miner</span> <span id="cost-auto">$50</span>
                <div class="progress-bar" id="bar-auto"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">
            <h3>Dashboard</h3>
            <p id="multiplier">Multiplier: 1.0x</p>
            <div id="prestigeBtn" onclick="prestige()" style="background:#b91c1c; color:white; padding:12px; text-align:center; border-radius:8px; cursor:pointer;">PRESTIGE (Locked)</div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay">
        <div class="modal-content">
            <h3>Settings</h3>
            <label><input type="checkbox" id="soundToggle" checked> Enable Sounds</label><br><br>
            <div onclick="toggleSettings()" style="width:100%; padding:10px; background:var(--accent); color:var(--bg); text-align:center; border-radius:8px; cursor:pointer; font-weight:bold;">CLOSE</div>
        </div>
    </div>

    <script>
        let money = 0, perClick = 1, perSecond = 0, totalEarnings = 0, prestigeMultiplier = 1.0;
        let costs = { intern: 10, auto: 50 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleSettings() { document.getElementById('settings-overlay').classList.toggle('active'); }

        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function clickMoney(event) {
            let income = Math.ceil(perClick * prestigeMultiplier);
            money += income; totalEarnings += income;
            if(document.getElementById('soundToggle').checked) playClickSound();
            updateDisplay();
        }

        function buyUpgrade(type) {
            let isBuyMax = document.getElementById('buyMaxToggle').checked;
            if (isBuyMax) {
                while (money >= costs[type]) {
                    money -= costs[type];
                    if (type === 'intern') perClick++;
                    if (type === 'auto') perSecond += 1;
                    costs[type] = Math.floor(costs[type] * 1.15);
                }
            } else if (money >= costs[type]) {
                money -= costs[type];
                if (type === 'intern') perClick++;
                if (type === 'auto') perSecond += 1;
                costs[type] = Math.floor(costs[type] * 1.15);
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + Math.floor(money);
            document.getElementById('mps').innerText = `Income: ${Math.floor(perSecond * prestigeMultiplier)}/sec`;
            document.getElementById('multiplier').innerText = `Multiplier: ${prestigeMultiplier.toFixed(1)}x`;
            
            for(let t in costs) {
                document.getElementById(`cost-${t}`).innerText = `$${costs[t]}`;
                let bar = document.getElementById(`bar-${t}`);
                bar.style.width = Math.min((money / costs[t]) * 100, 100) + '%';
            }
            
            let canPrestige = totalEarnings >= 1000000;
            let btn = document.getElementById('prestigeBtn');
            btn.style.opacity = canPrestige ? "1" : "0.5";
            btn.style.cursor = canPrestige ? "pointer" : "default";
            btn.innerText = canPrestige ? "PRESTIGE NOW" : "PRESTIGE (Locked)";
            
            saveGame();
        }

        function saveGame() {
            localStorage.setItem('tycoonSave', JSON.stringify({ money, perClick, perSecond, costs, lastSaved: Date.now(), totalEarnings, prestigeMultiplier }));
        }

        function prestige() { 
            if(totalEarnings >= 1000000 && confirm("Reset all progress for a permanent +0.5x multiplier?")) { 
                prestigeMultiplier += 0.5;
                money = 0; perClick = 1; perSecond = 0; totalEarnings = 0; costs = { intern: 10, auto: 50 };
                saveGame(); location.reload(); 
            } 
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('tycoonSave'));
            if (saved) {
                let secondsPassed = (Date.now() - saved.lastSaved) / 1000;
                let offlineCash = Math.floor(secondsPassed * saved.perSecond * (saved.prestigeMultiplier || 1.0));
                money = saved.money + offlineCash;
                totalEarnings = (saved.totalEarnings || 0) + offlineCash;
                perClick = saved.perClick; perSecond = saved.perSecond; costs = saved.costs; prestigeMultiplier = saved.prestigeMultiplier || 1.0;
            }
            setInterval(() => { money += (perSecond * prestigeMultiplier); totalEarnings += (perSecond * prestigeMultiplier); updateDisplay(); }, 1000);
            updateDisplay();
        };
    </script>
</body>
</html>
