<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Empire: Hyper-Caffeinated</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0908;
            --card: rgba(26, 22, 20, 0.9);
            --accent: #d4a373;
            --accent-bright: #faedcd;
            --danger: #e63946;
            --success: #a7c957;
            --text: #f1f1f1;
            --gold: #ffb703;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            margin: 0; font-family: 'Bricolage Grotesque', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; height: -webkit-fill-available;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* --- Header / HUD --- */
        #hud {
            padding: 20px; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center;
        }
        .stat b { display: block; font-size: 1.6rem; color: var(--accent-bright); font-family: 'JetBrains Mono', monospace; }
        .stat span { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Layout --- */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        /* Left: Clicking Area */
        #clicker-view {
            flex: 1.5; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            background: radial-gradient(circle at center, #1c1512 0%, #0a0908 100%);
        }

        #cup-container {
            position: relative; cursor: pointer; transition: transform 0.05s;
            z-index: 10;
        }
        #cup-container:active { transform: scale(0.92); }
        
        #coffee-svg { width: 280px; filter: drop-shadow(0 0 50px rgba(212, 163, 115, 0.2)); }
        
        .floating-bean {
            position: absolute; pointer-events: none; font-size: 1.5rem;
            animation: floatOut 1s ease-out forwards; z-index: 100;
        }

        /* Right: UI Tabs Area */
        #ui-view {
            flex: 1; background: var(--card); border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; min-width: 380px;
        }

        .tab-bar { display: flex; background: rgba(0,0,0,0.3); }
        .tab-btn {
            flex: 1; padding: 18px 10px; border: none; background: none;
            color: var(--text); cursor: pointer; font-family: inherit;
            font-weight: 600; font-size: 0.8rem; opacity: 0.4;
            border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--accent); background: rgba(255,255,255,0.03); }

        .pane { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .pane.active { display: block; }

        /* --- Shop UI --- */
        .shop-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .buy-qty {
            flex: 1; padding: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .buy-qty.active { background: var(--accent); color: #000; font-weight: bold; }

        .item-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s; cursor: pointer;
        }
        .item-card:hover { background: rgba(255,255,255,0.06); border-color: var(--accent); }
        .item-card.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        
        .item-info b { display: block; font-size: 1.1rem; color: var(--accent); }
        .item-info span { font-size: 0.75rem; opacity: 0.6; }
        .item-cost { text-align: right; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        /* --- Relic System --- */
        .gacha-box {
            background: linear-gradient(135deg, #2c1b12, #4e342e);
            padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px;
            border: 2px solid var(--gold);
        }
        .relic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .relic-card {
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;
            font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- Notifications --- */
        #toast-container {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; pointer-events: none;
        }
        .toast {
            background: var(--danger); color: white; padding: 12px 25px;
            border-radius: 50px; margin-top: 10px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes floatOut { to { transform: translateY(-100px) translateX(20px) rotate(20deg); opacity: 0; } }

        /* Mobile */
        @media (max-width: 800px) {
            #main-container { flex-direction: column; }
            #ui-view { min-width: 100%; flex: 1.2; }
            #hud { grid-template-columns: 1fr; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="hud">
        <div class="stat"><span>Current Brew</span><b id="bean-count">0</b></div>
        <div class="stat"><span>Production/sec</span><b id="cps-count">0</b></div>
        <div class="stat"><span>Relic Multi</span><b id="multi-count">1.0x</b></div>
    </div>

    <div id="main-container">
        <section id="clicker-view">
            <div id="cup-container">
                <svg id="coffee-svg" viewBox="0 0 100 100">
                    <path d="M20,30 Q20,85 50,85 Q80,85 80,30" fill="none" stroke="var(--accent)" stroke-width="3"/>
                    <path d="M22,32 Q22,83 50,83 Q78,83 78,32 Z" fill="#2c1b12"/>
                    <path d="M80,40 Q95,40 95,55 Q95,70 80,70" fill="none" stroke="var(--accent-bright)" stroke-width="4"/>
                    <rect x="15" y="25" width="70" height="10" rx="5" fill="var(--accent-bright)"/>
                </svg>
            </div>
        </section>

        <section id="ui-view">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="showTab('shop')">EQUIPMENT</button>
                <button class="tab-btn" onclick="showTab('relics')">RELICS</button>
                <button class="tab-btn" onclick="showTab('stats')">EMPIRE</button>
            </div>

            <div id="shop-pane" class="pane active">
                <div class="shop-controls">
                    <button class="buy-qty active" onclick="setBuyQty(1)">X1</button>
                    <button class="buy-qty" onclick="setBuyQty(10)">X10</button>
                    <button class="buy-qty" onclick="setBuyQty('MAX')">MAX</button>
                </div>
                <div id="shop-items"></div>
            </div>

            <div id="relics-pane" class="pane">
                <div class="gacha-box">
                    <h3>Ancient Grinder</h3>
                    <p>Roll for a random Relic</p>
                    <button class="buy-qty active" style="width:100%" onclick="rollRelic()">ROLL (5,000 Beans)</button>
                </div>
                <h3>Your Artifacts</h3>
                <div id="relic-list" class="relic-grid"></div>
            </div>

            <div id="stats-pane" class="pane">
                <div class="gacha-box" style="border-color: var(--accent); text-align: left;">
                    <h3>Empire Stats</h3>
                    <p>Lifetime Beans: <span id="stat-lifetime">0</span></p>
                    <p>Total Clicks: <span id="stat-clicks">0</span></p>
                    <p>Prestige Multiplier: <span id="stat-prestige">1.0x</span></p>
                </div>
                <button class="buy-qty" style="width:100%; background: var(--danger); color:white" onclick="hardReset()">Wipe Save</button>
            </div>
        </section>
    </div>

    <script>
        // --- Game Constants & Data ---
        const ITEMS = [
            { id: 'intern', name: 'Coffee Intern', baseCost: 15, baseCps: 0.5, desc: 'Taps the cup for college credit.' },
            { id: 'press', name: 'French Press', baseCost: 100, baseCps: 4, desc: 'Coarse grounds, steady gains.' },
            { id: 'moka', name: 'Moka Pot', baseCost: 1100, baseCps: 18, desc: 'High-pressure stovetop brewing.' },
            { id: 'espresso', name: 'Espresso Engine', baseCost: 12000, baseCps: 75, desc: 'Professional steam power.' },
            { id: 'roaster', name: 'Bulk Roaster', baseCost: 130000, baseCps: 380, desc: 'Turning beans black by the ton.' },
            { id: 'cafe', name: 'Urban Cafe', baseCost: 1400000, baseCps: 1900, desc: 'A hub for caffeine addicts.' },
            { id: 'plantation', name: 'Coffee Plantation', baseCost: 20000000, baseCps: 11000, desc: 'Control the entire source.' },
            { id: 'star', name: 'Dyson Coffee Ring', baseCost: 500000000, baseCps: 85000, desc: 'Siphon energy from a sun to roast.' }
        ];

        const RELICS = [
            { name: 'Golden Bean', multi: 1.2, rarity: 'Common' },
            { name: 'Silver Stirrer', multi: 1.5, rarity: 'Rare' },
            { name: 'Ancient Mug', multi: 2.0, rarity: 'Epic' },
            { name: 'Caffeine Nebula', multi: 5.0, rarity: 'Legendary' }
        ];

        // --- State Management ---
        let state = {
            beans: 0,
            lifetime: 0,
            clicks: 0,
            cps: 0,
            buyQty: 1,
            inventory: {},
            relics: [],
            prestigeMulti: 1.0
        };

        // Initialize Inventory
        ITEMS.forEach(i => state.inventory[i.id] = 0);

        // --- Core Functions ---
        function addBeans(amt) {
            state.beans += amt;
            state.lifetime += amt;
            updateHUD();
        }

        function calculateCps() {
            let base = 0;
            ITEMS.forEach(item => {
                base += (state.inventory[item.id] * item.baseCps);
            });
            
            let relicMulti = 1;
            state.relics.forEach(r => relicMulti *= r.multi);
            
            state.cps = base * state.prestigeMulti * relicMulti;
            return state.cps;
        }

        function getCost(item, amt) {
            let currentOwned = state.inventory[item.id];
            let totalCost = 0;
            for(let i=0; i<amt; i++) {
                totalCost += Math.floor(item.baseCost * Math.pow(1.15, currentOwned + i));
            }
            return totalCost;
        }

        function getMaxBuy(item) {
            let b = state.beans;
            let c = item.baseCost;
            let k = state.inventory[item.id];
            let r = 1.15;
            // Geometric series formula for max buy:
            // n = floor( log( (b * (r - 1) / (c * r^k)) + 1 ) / log(r) )
            let n = Math.floor(Math.log(((b * (r - 1)) / (c * Math.pow(r, k))) + 1) / Math.log(r));
            return Math.max(0, n);
        }

        // --- Actions ---
        function buyItem(id) {
            const item = ITEMS.find(i => i.id === id);
            let qty = state.buyQty === 'MAX' ? getMaxBuy(item) : state.buyQty;
            
            if (qty <= 0 && state.buyQty === 'MAX') {
                showToast("Cannot afford any!");
                return;
            }

            const cost = getCost(item, qty);
            if (state.beans >= cost) {
                state.beans -= cost;
                state.inventory[id] += qty;
                playSynth(440 + (qty * 10), 'sine', 0.1);
                updateUI();
            } else {
                showToast("Insufficient Beans!");
            }
        }

        function rollRelic() {
            const cost = 5000;
            if (state.beans >= cost) {
                state.beans -= cost;
                const rand = RELICS[Math.floor(Math.random() * RELICS.length)];
                state.relics.push({...rand});
                showToast(`Unlocking: ${rand.name}!`, 'success');
                playSynth(880, 'triangle', 0.3);
                updateUI();
            } else {
                showToast("Need 5,000 Beans!");
            }
        }

        // --- UI Rendering ---
        function updateHUD() {
            document.getElementById('bean-count').innerText = Math.floor(state.beans).toLocaleString();
            document.getElementById('cps-count').innerText = calculateCps().toFixed(1);
            
            let relicMulti = 1;
            state.relics.forEach(r => relicMulti *= r.multi);
            document.getElementById('multi-count').innerText = relicMulti.toFixed(1) + 'x';
        }

        function updateUI() {
            updateHUD();
            
            // Shop
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            ITEMS.forEach(item => {
                let qty = state.buyQty === 'MAX' ? getMaxBuy(item) : state.buyQty;
                if (qty === 0 && state.buyQty === 'MAX') qty = 1; // Show cost for next 1
                
                const cost = getCost(item, qty);
                const canAfford = state.beans >= cost;
                
                const div = document.createElement('div');
                div.className = `item-card ${state.lifetime < item.baseCost ? 'locked' : ''}`;
                div.onclick = () => buyItem(item.id);
                div.innerHTML = `
                    <div class="item-info">
                        <b>${item.name} (${state.inventory[item.id]})</b>
                        <span>+${item.baseCps} CPS | ${item.desc}</span>
                    </div>
                    <div class="item-cost" style="color: ${canAfford ? 'var(--success)' : 'var(--danger)'}">
                        ${state.buyQty === 'MAX' ? 'MAX(' + qty + ')' : 'x' + qty}<br>
                        ☕ ${cost.toLocaleString()}
                    </div>
                `;
                container.appendChild(div);
            });

            // Relics
            const rList = document.getElementById('relic-list');
            rList.innerHTML = '';
            state.relics.forEach(r => {
                rList.innerHTML += `<div class="relic-card"><b>${r.name}</b><br>${r.multi}x Boost</div>`;
            });

            // Stats
            document.getElementById('stat-lifetime').innerText = Math.floor(state.lifetime).toLocaleString();
            document.getElementById('stat-clicks').innerText = state.clicks;
            document.getElementById('stat-prestige').innerText = state.prestigeMulti + 'x';
        }

        // --- Helper Systems ---
        function showToast(msg, type = 'danger') {
            const t = document.createElement('div');
            t.className = 'toast';
            if (type === 'success') t.style.background = 'var(--success)';
            t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function playSynth(freq, type, dur) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + dur);
                osc.connect(g);
                g.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + dur);
            } catch(e) {}
        }

        function spawnBean(e) {
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            const b = document.createElement('div');
            b.className = 'floating-bean';
            b.style.left = x + 'px';
            b.style.top = y + 'px';
            b.innerText = '☕';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 1000);
        }

        // --- Main Logic ---
        document.getElementById('cup-container').addEventListener('mousedown', (e) => {
            state.clicks++;
            let power = 1 + (calculateCps() * 0.05);
            addBeans(power);
            spawnBean(e);
            playSynth(200 + Math.random() * 100, 'sine', 0.05);
        });

        function showTab(id) {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-pane').classList.add('active');
            event.target.classList.add('active');
            updateUI();
        }

        function setBuyQty(q) {
            state.buyQty = q;
            document.querySelectorAll('.buy-qty').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateUI();
        }

        function save() { localStorage.setItem('CoffeeEmpire_v4', JSON.stringify(state)); }
        function load() {
            const s = localStorage.getItem('CoffeeEmpire_v4');
            if (s) state = JSON.parse(s);
        }

        function hardReset() {
            if(confirm("Erase all progress?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Loop
        load();
        updateUI();
        setInterval(() => {
            addBeans(calculateCps() / 10);
        }, 100);
        setInterval(save, 10000);

    </script>
</body>
</html>
