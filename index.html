<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee Tycoon: Grand Opening</title>
    <style>
        /* Modern Industrial Coffee Shop Theme */
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-gold: #ffc107;
            --coffee-brown: #6d4c41;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #news-ticker {
            width: 100%;
            background: #000;
            color: #00ff00;
            padding: 10px;
            text-align: center;
            font-family: monospace;
            border-bottom: 2px solid #333;
        }

        .main-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            width: 90%;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .clicker-panel, .shop-panel {
            background: var(--panel-color);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex: 1;
            min-width: 300px;
        }

        #coffee-button {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #8d6e63, #4e342e);
            border: 10px solid #3e2723;
            border-radius: 50%;
            font-size: 80px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            transition: transform 0.1s;
        }

        #coffee-button:active {
            transform: scale(0.95);
        }

        .upgrade-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #444;
            border: none;
            border-radius: 8px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upgrade-btn:hover { background: var(--coffee-brown); }

        .stats { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="news-ticker">Welcome to the Coffee Empire. Brewing operations commencing...</div>

    <div class="main-container">
        <!-- Clicker Section -->
        <div class="clicker-panel">
            <h1 id="title">Coffee Shop</h1>
            <div class="stats">Cups Brewed: <span id="counter">0</span></div>
            <div class="stats">CPS: <span id="cps">0</span></div>
            <button id="coffee-button">☕</button>
            <button id="prestige-btn" style="background:purple; width:100%; padding:10px;">Prestige (Multiplier: 1.0x)</button>
        </div>

        <!-- Shop Section -->
        <div class="shop-panel">
            <h2>Upgrades</h2>
            <div id="shop-list">
                <button class="upgrade-btn" onclick="buyUpgrade('barista')">Hire Barista (15 cups)</button>
                <button class="upgrade-btn" onclick="buyUpgrade('machine')">Espresso Machine (100 cups)</button>
                <button class="upgrade-btn" onclick="buyUpgrade('franchise')">Open Franchise (1000 cups)</button>
            </div>
        </div>
    </div>

    <script>
        // Game State Variables
        let cups = 0;
        let cps = 0;
        let multiplier = 1.0;
        
        let inventory = {
            barista: { count: 0, baseCost: 15, production: 0.5 },
            machine: { count: 0, baseCost: 100, production: 5 },
            franchise: { count: 0, baseCost: 1000, production: 50 }
        };

        // UI Update Function
        function updateDisplay() {
            document.getElementById('counter').innerText = Math.floor(cups);
            document.getElementById('cps').innerText = cps.toFixed(1);
            document.getElementById('prestige-btn').innerText = `Prestige (Multiplier: ${multiplier.toFixed(1)}x)`;
        }

        // Logic for buying
        function buyUpgrade(type) {
            let item = inventory[type];
            if (cups >= item.baseCost) {
                cups -= item.baseCost;
                item.count++;
                item.baseCost = Math.floor(item.baseCost * 1.5);
                calculateCPS();
                updateDisplay();
                // Refresh button text
                document.getElementById(type + '-btn')?.innerText = `Buy ${type} (${item.baseCost})`;
            }
        }

        // Logic for math
        function calculateCPS() {
            cps = (
                (inventory.barista.count * inventory.barista.production) +
                (inventory.machine.count * inventory.machine.production) +
                (inventory.franchise.count * inventory.franchise.production)
            ) * multiplier;
        }

        // Click Event
        document.getElementById('coffee-button').addEventListener('click', () => {
            cups += (1 * multiplier);
            updateDisplay();
        });

        // Prestige System
        document.getElementById('prestige-btn').addEventListener('click', () => {
            if(confirm("Reset all progress for a permanent 0.5x multiplier boost?")) {
                multiplier += 0.5;
                cups = 0;
                for(let key in inventory) {
                    inventory[key].count = 0;
                    inventory[key].baseCost = inventory[key].baseCost / 2; // Simplify cost reset
                }
                calculateCPS();
                updateDisplay();
            }
        });

        // Main Loop
        setInterval(() => {
            cups += (cps / 10); // Run 10 times a second for smoothness
            updateDisplay();
        }, 100);

        // News Ticker Logic
        const headlines = ["New beans imported from Ethiopia!", "Coffee demand reaches all-time high!", "Local barista wins latte art contest!"];
        setInterval(() => {
            document.getElementById('news-ticker').innerText = headlines[Math.floor(Math.random() * headlines.length)];
        }, 8000);

    </script>
</body>
</html>
