<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Empire: Barista's Dream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0807;
            --panel: #161311;
            --accent: #ff9d5c;
            --accent-glow: rgba(255, 157, 92, 0.4);
            --text: #fdf5f0;
            --secondary: #83c5be;
            --locked: #3a322d;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0; font-family: 'Outfit', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; height: 100dvh; /* Dynamic height for mobile */
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- Header: Neon HUD --- */
        #hud {
            display: grid; grid-template-columns: 1fr 1fr;
            padding: 12px; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            z-index: 100;
        }
        .stat { font-size: 0.7rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .stat b { display: block; font-size: 1.2rem; color: var(--accent); font-family: 'JetBrains Mono'; }

        /* --- Main Area (Reduced Height for more Shop space) --- */
        #view-top {
            height: 30vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* Animated Steam */
        .steam-container { position: absolute; top: 15%; display: flex; gap: 10px; }
        .steam-line {
            width: 4px; height: 30px; background: rgba(255,255,255,0.2);
            border-radius: 10px; filter: blur(4px);
            animation: steamRise 2s infinite ease-in-out;
        }
        @keyframes steamRise {
            0% { transform: translateY(0) scaleX(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-60px) scaleX(2); opacity: 0; }
        }

        #cup-box { 
            position: relative; cursor: pointer; transition: 0.1s; z-index: 10;
        }
        #cup-box:active { transform: scale(0.85); }
        #main-cup { width: 130px; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        /* --- UI Menu (Takes up remaining space) --- */
        #view-bottom {
            flex: 1; background: var(--panel);
            border-top: 2px solid rgba(255,255,255,0.1);
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            display: flex; flex-direction: column;
            overflow: hidden; /* Important for inner scroll */
        }

        .tabs {
            display: flex; background: rgba(0,0,0,0.3); padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: none;
            color: #fff; opacity: 0.4; font-weight: 800; font-size: 0.75rem;
            transition: 0.3s;
        }
        .tab-btn.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Scrolling Content */
        .pane { 
            flex: 1; overflow-y: auto; padding: 15px; display: none; 
            padding-bottom: 40px; /* Space for the bottom browser bar */
        }
        .pane.active { display: block; }

        /* --- Item Cards --- */
        .card {
            background: rgba(255,255,255,0.03); border-radius: 15px;
            padding: 15px; margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideIn 0.3s ease-out;
        }
        .card.affordable { border-color: var(--accent); background: rgba(255,157,92,0.05); }
        .card.locked { opacity: 0.4; background: var(--locked); cursor: not-allowed; }

        .card-meta b { display: block; font-size: 1rem; color: var(--accent); }
        .card-meta span { font-size: 0.7rem; opacity: 0.6; }
        .card-price { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 0.9rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Click Particles */
        .particle {
            position: absolute; pointer-events: none;
            font-size: 1.2rem; font-weight: 900; color: #fff;
            animation: particleFloat 0.8s ease-out forwards; z-index: 50;
        }
        @keyframes particleFloat {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* Mass Buy Buttons */
        .qty-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .qty-btn {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333;
            background: rgba(255,255,255,0.05); color: #fff; font-size: 0.8rem;
        }
        .qty-btn.active { background: var(--accent); color: #000; font-weight: 800; border: none; }

        /* Prestige Screen */
        .prestige-box {
            text-align: center; padding: 25px; border-radius: 20px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            border: 1px solid #a29bfe;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat">BEANS<b id="beans-val">0</b></div>
        <div class="stat" style="text-align: right;">PER SEC<b id="cps-val">0</b></div>
        <div class="stat">AROMA PTS<b id="aroma-val">0</b></div>
        <div class="stat" style="text-align: right;">MULTIPLIER<b id="multi-val">1.0x</b></div>
    </div>

    <div id="view-top">
        <div class="steam-container">
            <div class="steam-line" style="animation-delay: 0s"></div>
            <div class="steam-line" style="animation-delay: 0.4s"></div>
            <div class="steam-line" style="animation-delay: 0.8s"></div>
        </div>
        <div id="cup-box">
            <svg id="main-cup" viewBox="0 0 100 100">
                <path d="M20,30 Q20,85 50,85 Q80,85 80,30" fill="none" stroke="var(--accent)" stroke-width="4"/>
                <path d="M22,33 Q22,82 50,82 Q78,82 78,33 Z" fill="#2c1b12"/>
                <rect x="15" y="25" width="70" height="10" rx="5" fill="#fdf5f0"/>
                <path d="M80,45 Q95,45 95,60 Q95,75 80,75" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div id="view-bottom">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTab('shop')">SHOP</button>
            <button class="tab-btn" onclick="setTab('items')">GOALS</button>
            <button class="tab-btn" onclick="setTab('prestige')">PRESTIGE</button>
        </div>

        <div id="pane-shop" class="pane active">
            <div class="qty-group">
                <button class="qty-btn active" id="q1" onclick="setQty(1)">x1</button>
                <button class="qty-btn" id="q10" onclick="setQty(10)">x10</button>
                <button class="qty-btn" id="qmax" onclick="setQty('MAX')">MAX</button>
            </div>
            <div id="shop-items"></div>
        </div>

        <div id="pane-items" class="pane">
            <h3 style="color:var(--accent)">Empire Milestones</h3>
            <div id="goal-list"></div>
        </div>

        <div id="pane-prestige" class="pane">
            <div class="prestige-box">
                <h2 style="color:#a29bfe">Quantum Roast</h2>
                <p style="font-size:0.8rem; opacity:0.7">Sacrifice your empire for Aroma Points. Each point increases production by +2% permanently.</p>
                <div style="margin:20px 0;">
                    <span style="font-size:0.8rem">Pending Aroma:</span><br>
                    <b id="pending-aroma" style="font-size:2rem; color:var(--accent)">0</b>
                </div>
                <button class="qty-btn active" style="width:100%; height:50px" onclick="doPrestige()">ASCEND NOW</button>
            </div>
        </div>
    </div>

    <script>
        // --- Game Config ---
        const DATABASE = [
            { id: 's1', name: 'Plastic Stirrer', cost: 15, cps: 0.2, desc: 'Every bit helps.' },
            { id: 's2', name: 'College Intern', cost: 100, cps: 1.2, desc: 'Brewing for experience.' },
            { id: 's3', name: 'French Press', cost: 1100, cps: 8, desc: 'More caffeine, more beans.' },
            { id: 's4', name: 'Moka Pot', cost: 12500, cps: 42, desc: 'Classic stovetop power.' },
            { id: 's5', name: 'Espresso Unit', cost: 140000, cps: 190, desc: 'Pro-grade steam.' },
            { id: 's6', name: 'Coffee Truck', cost: 1600000, cps: 1050, desc: 'Brewing on the go.' },
            { id: 's7', name: 'Artisan Cafe', cost: 20000000, cps: 6800, desc: 'The local favorite.' },
            { id: 's8', name: 'Bulk Roastery', cost: 250000000, cps: 35000, desc: 'Industrial scale.' },
            { id: 's9', name: 'Java Plantation', cost: 4000000000, cps: 210000, desc: 'Own the land.' },
            { id: 's10', name: 'Coffee Singularity', cost: 100000000000, cps: 1500000, desc: 'Quantum caffeine.' }
        ];

        let state = {
            beans: 0,
            lifetime: 0,
            aroma: 0,
            inventory: {},
            qty: 1
        };

        // --- Logic ---
        function init() {
            const saved = localStorage.getItem('CoffeeDream_v6');
            if (saved) state = JSON.parse(saved);
            DATABASE.forEach(item => { if (!state.inventory[item.id]) state.inventory[item.id] = 0; });
            render();
            tick();
        }

        function calculateCps() {
            let base = 0;
            DATABASE.forEach(item => base += state.inventory[item.id] * item.cps);
            return base * (1 + state.aroma * 0.02);
        }

        function tick() {
            setInterval(() => {
                let gain = calculateCps() / 10;
                state.beans += gain;
                state.lifetime += gain;
                updateStats();
            }, 100);
            setInterval(() => localStorage.setItem('CoffeeDream_v6', JSON.stringify(state)), 10000);
        }

        function getPurchaseDetails(item) {
            let current = state.inventory[item.id];
            let count = state.qty;
            if (count === 'MAX') {
                count = Math.floor(Math.log(((state.beans * (1.15 - 1)) / (item.cost * Math.pow(1.15, current))) + 1) / Math.log(1.15));
                count = Math.max(1, count);
            }
            let totalCost = (item.cost * (Math.pow(1.15, current) * (Math.pow(1.15, count) - 1))) / (1.15 - 1);
            return { cost: Math.floor(totalCost), count: count };
        }

        function buy(id) {
            const item = DATABASE.find(i => i.id === id);
            const { cost, count } = getPurchaseDetails(item);
            if (state.beans >= cost) {
                state.beans -= cost;
                state.inventory[id] += count;
                render();
            }
        }

        // --- UI ---
        function updateStats() {
            document.getElementById('beans-val').innerText = Math.floor(state.beans).toLocaleString();
            document.getElementById('cps-val').innerText = calculateCps().toLocaleString(undefined, {maximumFractionDigits:1});
            document.getElementById('aroma-val').innerText = state.aroma;
            document.getElementById('multi-val').innerText = (1 + state.aroma * 0.02).toFixed(2) + 'x';
            
            let pot = Math.floor(Math.sqrt(state.lifetime / 1000000));
            document.getElementById('pending-aroma').innerText = Math.max(0, pot - state.aroma);
        }

        function render() {
            updateStats();
            const shop = document.getElementById('shop-items');
            shop.innerHTML = '';

            // Show current items + next 3 locked items
            let visibleCount = 0;
            DATABASE.forEach(item => {
                const currentOwned = state.inventory[item.id];
                const isLocked = state.lifetime < item.cost * 0.3 && currentOwned === 0;
                
                if (isLocked && visibleCount > 2) return;
                if (isLocked) visibleCount++;

                const { cost, count } = getPurchaseDetails(item);
                const affordable = state.beans >= cost;

                const card = document.createElement('div');
                card.className = `card ${isLocked ? 'locked' : (affordable ? 'affordable' : '')}`;
                if (!isLocked) card.onclick = () => buy(item.id);
                
                card.innerHTML = `
                    <div class="card-meta">
                        <b>${isLocked ? '???' : item.name + ' [' + currentOwned + ']'}</b>
                        <span>${isLocked ? 'Keep brewing to unlock' : '+'+item.cps+' CPS per unit'}</span>
                    </div>
                    <div class="card-price">${isLocked ? '---' : '☕ ' + cost.toLocaleString()}</div>
                `;
                shop.appendChild(card);
            });
        }

        function doPrestige() {
            let pot = Math.floor(Math.sqrt(state.lifetime / 1000000));
            if (pot <= state.aroma) return alert("Earn more Lifetime Beans to gain Aroma Points!");
            if (confirm("Reset everything for " + (pot - state.aroma) + " Aroma Points?")) {
                state.aroma = pot;
                state.beans = 0;
                DATABASE.forEach(i => state.inventory[i.id] = 0);
                render();
            }
        }

        // --- Interaction ---
        function setTab(id) {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pane-' + id).classList.add('active');
            event.target.classList.add('active');
            render();
        }

        function setQty(q) {
            state.qty = q;
            document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        document.getElementById('cup-box').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const clickVal = 1 + (calculateCps() * 0.05);
            state.beans += clickVal;
            state.lifetime += clickVal;
            
            const touch = e.touches[0];
            createParticle(touch.clientX, touch.clientY, Math.floor(clickVal));
            updateStats();
        });

        function createParticle(x, y, val) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            p.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
            p.style.setProperty('--ty', '-100px');
            p.innerText = '☕ +' + val;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        init();
    </script>
</body>
</html>
