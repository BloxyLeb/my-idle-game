<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { color: #4ecca3; }
        #stats { font-size: 20px; margin: 15px 0; background: #16213e; padding: 15px; border-radius: 10px; }
        #money { font-size: 40px; font-weight: bold; color: #4ecca3; }
        
        .button-group { display: flex; flex-direction: column; gap: 10px; }
        /* Upgrade Button Styles */
        .upgrade-btn { position: relative; overflow: hidden; padding: 15px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background-color: #0f3460; color: white; transition: 0.2s; }
        .progress-bar { position: absolute; bottom: 0; left: 0; height: 5px; background-color: #4ecca3; width: 0%; transition: width 0.3s; }
        
        #clickBtn { background-color: #4ecca3; color: #1a1a2e; font-weight: bold; padding: 30px; font-size: 20px; border: none; border-radius: 8px; width: 100%; }
        
        #achievements { margin-top: 20px; font-size: 14px; color: #aaa; background: #16213e; padding: 10px; border-radius: 8px; }
        #prestigeBtn { background-color: #b91c1c; color: white; font-weight: bold; padding: 15px; margin-top: 20px; width: 100%; border: none; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Idle Tycoon</h1>
        <div id="stats">
            <div id="money">$0</div>
            <div id="mps">Income: 0/sec</div>
            <div id="multiplier">Multiplier: 1.0x</div>
        </div>
        
        <button id="clickBtn" onclick="clickMoney(event)">MINE MONEY</button>

        <div class="button-group">
            <button class="upgrade-btn" onclick="buyUpgrade('intern')">Intern <span id="cost-intern">($10)</span><div class="progress-bar" id="bar-intern"></div></button>
            <button class="upgrade-btn" onclick="buyUpgrade('auto')">Auto-Miner <span id="cost-auto">($50)</span><div class="progress-bar" id="bar-auto"></div></button>
            <button class="upgrade-btn" onclick="buyUpgrade('factory')">Factory <span id="cost-factory">($500)</span><div class="progress-bar" id="bar-factory"></div></button>
        </div>

        <button id="prestigeBtn" onclick="prestige()">PRESTIGE (Reset for +0.5x Multiplier)</button>
        
        <div id="achievements">
            <strong>Achievements:</strong> <span id="ach-list">None yet!</span>
        </div>
    </div>

    <script>
        let money = 0, perClick = 1, perSecond = 0, totalEarnings = 0, prestigeMultiplier = 1.0;
        let costs = { intern: 10, auto: 50, factory: 500 };
        let baseCosts = { intern: 10, auto: 50, factory: 500 };
        let achievements = [];

        window.onload = () => {
            const saved = localStorage.getItem('idleGameSaveV3');
            if (saved) {
                const data = JSON.parse(saved);
                money = data.money; perClick = data.perClick; perSecond = data.perSecond; 
                costs = data.costs; totalEarnings = data.totalEarnings; prestigeMultiplier = data.prestigeMultiplier;
            }
            updateDisplay();
        };

        function clickMoney(event) {
            let income = Math.ceil(perClick * prestigeMultiplier);
            money += income;
            totalEarnings += income;
            updateDisplay();
        }

        function buyUpgrade(type) {
            if (money >= costs[type]) {
                money -= costs[type];
                if (type === 'intern') perClick += 1;
                if (type === 'auto') perSecond += 1;
                if (type === 'factory') perSecond += 10;
                costs[type] = Math.floor(costs[type] * 1.15);
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + Math.floor(money);
            document.getElementById('mps').innerText = `Income: ${Math.floor(perSecond * prestigeMultiplier)}/sec`;
            document.getElementById('multiplier').innerText = `Multiplier: ${prestigeMultiplier.toFixed(1)}x`;
            document.getElementById('prestigeBtn').innerText = `PRESTIGE (Reset for +0.5x, Next: ${(prestigeMultiplier + 0.5).toFixed(1)}x)`;

            // Update Progress Bars
            for(let type in costs) {
                let percent = (money / costs[type]) * 100;
                document.getElementById(`bar-${type}`).style.width = Math.min(percent, 100) + '%';
                document.getElementById(`cost-${type}`).innerText = `($${costs[type]})`;
            }

            // Prestige Unlock
            document.getElementById('prestigeBtn').style.display = (totalEarnings >= 1000000) ? 'block' : 'none';

            // Check Achievements
            checkAchievements();
            saveGame();
        }

        function checkAchievements() {
            let list = [];
            if (totalEarnings >= 1000) list.push("Novice");
            if (totalEarnings >= 100000) list.push("Rich");
            if (totalEarnings >= 1000000) list.push("Tycoon");
            document.getElementById('ach-list').innerText = list.join(', ');
        }

        function prestige() {
            if(confirm("Prestige? Reset all money/upgrades for a +0.5x permanent multiplier!")) {
                prestigeMultiplier += 0.5;
                money = 0; perClick = 1; perSecond = 0;
                costs = JSON.parse(JSON.stringify(baseCosts));
                saveGame();
                location.reload();
            }
        }

        function saveGame() {
            localStorage.setItem('idleGameSaveV3', JSON.stringify({ money, perClick, perSecond, costs, totalEarnings, prestigeMultiplier }));
        }

        setInterval(() => {
            money += (perSecond * prestigeMultiplier);
            totalEarnings += (perSecond * prestigeMultiplier);
            updateDisplay();
        }, 1000);
    </script>
</body>
</html>
