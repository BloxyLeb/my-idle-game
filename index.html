<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Shop Tycoon</title>
    <style>
        body {
            background-color: #f5f5dc;
            color: #4b3621;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent scrolling bounce */
        }
        
        #game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
        }

        button {
            padding: 15px;
            font-size: 16px;
            background-color: #6f4e37;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            /* This line stops the double-tap zoom behavior */
            touch-action: manipulation; 
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        /* Floating text animation */
        .floating-text {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>☕ Coffee Shop</h1>
        <h2 id="coffee-display">0 Cups</h2>
        <div id="stats">
            <p>Baristas: <span id="barista-count">0</span></p>
            <p>Machines: <span id="machine-count">0</span></p>
        </div>
        
        <button id="brew-btn">Brew Coffee</button>
        <button id="hire-barista">Hire Barista (Cost: 15)</button>
        <button id="buy-machine">Buy Machine (Cost: 100)</button>
    </div>

    <script>
        let coffee = 0;
        let baristas = 0;
        let machines = 0;
        let bCost = 15;
        let mCost = 100;

        const brewBtn = document.getElementById('brew-btn');
        const hireBarista = document.getElementById('hire-barista');
        const buyMachine = document.getElementById('buy-machine');

        // Click Logic
        brewBtn.addEventListener('click', (e) => {
            coffee++;
            spawnFloatingText(e.clientX, e.clientY);
            updateUI();
        });

        // Barista Logic
        hireBarista.addEventListener('click', () => {
            if (coffee >= bCost) {
                coffee -= bCost;
                baristas++;
                bCost = Math.floor(bCost * 1.5);
                hireBarista.innerText = `Hire Barista (Cost: ${bCost})`;
                updateUI();
            }
        });

        // Machine Logic
        buyMachine.addEventListener('click', () => {
            if (coffee >= mCost) {
                coffee -= mCost;
                machines++;
                mCost = Math.floor(mCost * 1.8);
                buyMachine.innerText = `Buy Machine (Cost: ${mCost})`;
                updateUI();
            }
        });
