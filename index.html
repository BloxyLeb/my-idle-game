<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Tycoon</title>
    <style>
        :root {
            --primary: #6f4e37;
            --accent: #d2691e;
        }
        body {
            background-color: #2c2420;
            color: #f5f5dc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }
        #game-container {
            background: #4b3621;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            width: 300px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid #6f4e37;
        }

        /* The Big Coffee Button */
        #brew-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 10px solid #5a2d0c;
            background-color: #8b4513;
            font-size: 70px;
            cursor: pointer;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 10px 0 #5a2d0c;
        }
        #brew-btn:active {
            transform: translateY(5px) scale(0.95);
            box-shadow: 0 5px 0 #5a2d0c;
        }

        /* Other Buttons */
        .upgrade-btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 12px;
            background-color: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .upgrade-btn:active { transform: scale(0.98); }
        
        .floating-text {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            font-size: 24px;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>☕ Coffee Shop</h1>
        <div style="font-size: 1.5rem; margin-bottom: 10px;">Cups: <span id="coffee-display">0</span></div>
        
        <button id="brew-btn">☕</button>
        
        <div id="stats" style="font-size: 0.9rem; margin-bottom: 15px;">
            Baristas: <span id="barista-count">0</span> | Machines: <span id="machine-count">0</span>
        </div>
        
        <button class="upgrade-btn" id="hire-barista">Hire Barista (Cost: 15)</button>
        <button class="upgrade-btn" id="buy-machine">Buy Machine (Cost: 100)</button>
        <button class="upgrade-btn" id="buy-grinder">Pro Grinder (Cost: 50)</button>
    </div>

    <script>
        let coffee = 0;
        let baristas = 0, machines = 0, clickPower = 1;
        let bCost = 15, mCost = 100, gCost = 50;

        const brewBtn = document.getElementById('brew-btn');

        function updateUI() {
            document.getElementById('coffee-display').innerText = Math.floor(coffee);
            document.getElementById('barista-count').innerText = baristas;
            document.getElementById('machine-count').innerText = machines;
            document.getElementById('hire-barista').innerText = `Hire Barista (Cost: ${bCost})`;
            document.getElementById('buy-machine').innerText = `Buy Machine (Cost: ${mCost})`;
            document.getElementById('buy-grinder').innerText = `Pro Grinder (Cost: ${gCost})`;
        }

        brewBtn.addEventListener('click', (e) => {
            coffee += clickPower;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            let div = document.createElement('div');
            div.className = 'floating-text';
            div.innerText = "+" + clickPower;
            div.style.left = (x - 10) + 'px';
            div.style.top = (y - 20) + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
            
            updateUI();
        });

        document.getElementById('hire-barista').addEventListener('click', () => {
            if (coffee >= bCost) {
                coffee -= bCost;
                baristas++;
                bCost = Math.floor(bCost * 1.5);
                updateUI();
            }
        });

        document.getElementById('buy-machine').addEventListener('click', () => {
            if (coffee >= mCost) {
                coffee -= mCost;
                machines++;
                mCost = Math.floor(mCost * 1.8);
                updateUI();
            }
        });

        document.getElementById('buy-grinder').addEventListener('click', () => {
            if (coffee >= gCost) {
                coffee -= gCost;
                clickPower += 1;
                gCost = Math.floor(gCost * 2.5);
                updateUI();
            }
        });

        setInterval(() => {
            coffee += (baristas * 0.5) + (machines * 5);
            updateUI();
        }, 1000);

        window.onload = () => {
            let save = JSON.parse(localStorage.getItem('coffeeSave'));
            if(save) {
                coffee = save.coffee; baristas = save.baristas; machines = save.machines;
                clickPower = save.clickPower || 1;
                bCost = save.bCost; mCost = save.mCost; gCost = save.gCost;
                updateUI();
            }
        };
        setInterval(() => localStorage.setItem('coffeeSave', JSON.stringify({coffee, baristas, machines, clickPower, bCost, mCost, gCost})), 2000);
    </script>
</body>
</html>
