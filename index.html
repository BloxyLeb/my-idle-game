<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { color: #4ecca3; }
        #stats { font-size: 24px; margin: 20px 0; background: #16213e; padding: 15px; border-radius: 10px; }
        #money { font-size: 40px; font-weight: bold; color: #4ecca3; }
        .button-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background-color: #0f3460; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background-color: #333; color: #666; }
        #clickBtn { background-color: #4ecca3; color: #1a1a2e; font-weight: bold; padding: 30px; font-size: 20px; }
        .data-btns { margin-top: 20px; }
        .data-btns button { font-size: 12px; padding: 5px 10px; background-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Idle Tycoon</h1>
        <div id="stats">
            <div id="money">$0</div>
            <div style="font-size: 14px; color: #aaa;">Income: <span id="mps">0</span>/sec</div>
        </div>
        
        <div class="button-group">
            <button id="clickBtn" onclick="clickMoney()">MINE MONEY</button>
            <button onclick="buyUpgrade('intern')">Hire Intern ($10) [+1 Click]</button>
            <button onclick="buyUpgrade('auto')">Auto-Miner ($50) [+$1/sec]</button>
            <button onclick="buyUpgrade('factory')">Mega Factory ($500) [+$10/sec]</button>
        </div>

        <div class="data-btns">
            <button onclick="saveGame()">Save Game</button>
            <button onclick="resetGame()" style="background-color: #a00;">Reset Data</button>
        </div>
    </div>

    <script>
        let money = 0;
        let perClick = 1;
        let perSecond = 0;

        // Load game on start
        window.onload = () => {
            const saved = localStorage.getItem('idleGameSave');
            if (saved) {
                const data = JSON.parse(saved);
                money = data.money;
                perClick = data.perClick;
                perSecond = data.perSecond;
                updateDisplay();
            }
        };

        function clickMoney() {
            money += perClick;
            updateDisplay();
        }

        function buyUpgrade(type) {
            if (type === 'intern' && money >= 10) {
                money -= 10; perClick += 1;
            } else if (type === 'auto' && money >= 50) {
                money -= 50; perSecond += 1;
            } else if (type === 'factory' && money >= 500) {
                money -= 500; perSecond += 10;
            } else {
                alert("Not enough money!");
                return;
            }
            updateDisplay();
            saveGame();
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + Math.floor(money);
            document.getElementById('mps').innerText = perSecond;
        }

        function saveGame() {
            const data = { money, perClick, perSecond };
            localStorage.setItem('idleGameSave', JSON.stringify(data));
        }

        function resetGame() {
            if(confirm("Are you sure? This erases everything!")) {
                localStorage.removeItem('idleGameSave');
                location.reload();
            }
        }

        setInterval(() => {
            money += perSecond;
            updateDisplay();
            if (Math.random() > 0.9) saveGame(); // Auto-save 10% of the time
        }, 1000);
    </script>
</body>
</html>
