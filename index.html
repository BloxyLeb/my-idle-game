<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Empire: Quantum Roast</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0c0b;
            --panel: #1a1816;
            --accent: #e29578;
            --text: #edf6f9;
            --secondary: #83c5be;
            --rare: #ffddd2;
            --prestige: #a29bfe;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; /* FIXES MOBILE ZOOM/DELAY */
        }

        body {
            margin: 0; font-family: 'Outfit', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; /* Prevents whole page bounce */
        }

        /* --- Compact HUD --- */
        #hud {
            padding: 10px 15px; background: rgba(0,0,0,0.8);
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
            border-bottom: 2px solid var(--accent);
        }
        .stat { font-size: 0.8rem; opacity: 0.8; }
        .stat b { display: block; font-size: 1.1rem; color: var(--accent); font-family: 'JetBrains Mono'; }

        /* --- Game Screen Split --- */
        #game-area {
            flex: 1; display: flex; flex-direction: column;
        }

        #clicker-section {
            height: 35vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; background: radial-gradient(circle, #2c1b12 0%, #0d0c0b 100%);
        }

        #cup-wrapper { position: relative; cursor: pointer; transition: 0.05s; }
        #cup-wrapper:active { transform: scale(0.9); }
        #cup-img { width: 140px; filter: drop-shadow(0 0 20px rgba(226, 149, 120, 0.4)); }

        /* --- UI Panels (Scrollable) --- */
        #menu-section {
            flex: 1; background: var(--panel); border-top-left-radius: 20px; border-top-right-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .tab-nav {
            display: flex; overflow-x: auto; background: rgba(0,0,0,0.2);
            scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            padding: 15px 20px; border: none; background: none; color: #fff;
            white-space: nowrap; font-family: inherit; font-weight: 600; font-size: 0.8rem;
            opacity: 0.5; transition: 0.2s;
        }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); }

        .pane { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .pane.active { display: block; }

        /* --- Cards UI --- */
        .card {
            background: rgba(255,255,255,0.03); border-radius: 12px;
            padding: 12px; margin-bottom: 8px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card.can-buy { border-color: rgba(226, 149, 120, 0.3); }
        .card.locked { opacity: 0.3; filter: grayscale(1); }
        
        .card-info b { display: block; color: var(--accent); font-size: 1rem; }
        .card-info i { font-size: 0.7rem; opacity: 0.6; font-style: normal; }
        .card-cost { text-align: right; font-family: 'JetBrains Mono'; font-weight: 700; font-size: 0.9rem; }

        /* --- Popups --- */
        .pop {
            position: absolute; color: white; pointer-events: none;
            font-weight: 800; animation: popOut 0.8s forwards; z-index: 100;
        }
        @keyframes popOut {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px) rotate(15deg); opacity: 0; }
        }

        /* --- Milestones --- */
        .m-card { border-left: 4px solid #444; background: rgba(0,0,0,0.2); padding: 10px; margin-bottom: 5px; font-size: 0.8rem; }
        .m-card.done { border-left-color: var(--secondary); background: rgba(131, 197, 190, 0.1); }

        .prestige-panel { text-align: center; padding: 20px; background: linear-gradient(to bottom, #2d3436, #000); border-radius: 15px; }

        /* Toast */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 10px 20px;
            border-radius: 30px; font-weight: 800; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="toast">Not enough beans!</div>

    <div id="hud">
        <div class="stat"><span>BEANS</span><b id="beans">0</b></div>
        <div class="stat"><span>PER SEC</span><b id="cps">0</b></div>
        <div class="stat"><span>AROMA PTS</span><b id="aroma">0</b></div>
        <div class="stat"><span>MULTIPLIER</span><b id="multi">1.0x</b></div>
    </div>

    <div id="game-area">
        <section id="clicker-section">
            <div id="cup-wrapper">
                <svg id="cup-img" viewBox="0 0 100 100">
                    <path d="M20,30 Q20,85 50,85 Q80,85 80,30" fill="none" stroke="var(--accent)" stroke-width="4"/>
                    <path d="M22,33 Q22,82 50,82 Q78,82 78,33 Z" fill="#2c1b12"/>
                    <rect x="15" y="25" width="70" height="10" rx="5" fill="#fff"/>
                    <path d="M80,45 Q95,45 95,60 Q95,75 80,75" fill="none" stroke="#fff" stroke-width="5"/>
                </svg>
            </div>
        </section>

        <section id="menu-section">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="setTab('shop')">SHOP</button>
                <button class="tab-btn" onclick="setTab('milestones')">GOALS</button>
                <button class="tab-btn" onclick="setTab('inventory')">ITEMS</button>
                <button class="tab-btn" onclick="setTab('prestige')">PRESTIGE</button>
            </div>

            <!-- Shop -->
            <div id="pane-shop" class="pane active">
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button class="tab-btn active" style="flex:1; border:1px solid #444" id="buy-1" onclick="setQty(1)">x1</button>
                    <button class="tab-btn" style="flex:1; border:1px solid #444" id="buy-10" onclick="setQty(10)">x10</button>
                    <button class="tab-btn" style="flex:1; border:1px solid #444" id="buy-max" onclick="setQty('MAX')">MAX</button>
                </div>
                <div id="shop-list"></div>
            </div>

            <!-- Milestones -->
            <div id="pane-milestones" class="pane">
                <h3>Milestones</h3>
                <div id="m-list"></div>
            </div>

            <!-- Inventory -->
            <div id="pane-inventory" class="pane">
                <h3>Relic Collection</h3>
                <div id="inv-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            </div>

            <!-- Prestige -->
            <div id="pane-prestige" class="pane">
                <div class="prestige-panel">
                    <h2 style="color:var(--prestige)">Ascend Empire</h2>
                    <p>Reset your current beans and shops for <b>Aroma Points</b>.</p>
                    <p>Each point = +2% Production.</p>
                    <div style="font-size:1.5rem; margin:20px 0;">Next: <b id="next-aroma" style="color:var(--accent)">0</b> Aroma</div>
                    <button class="tab-btn" style="background:var(--prestige); color:#000; width:100%; border-radius:10px; padding:15px;" onclick="prestige()">ROAST EMPIRE</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- Data ---
        const ITEMS = [
            { id: 'stir', name: 'Plastic Stirrer', cost: 15, cps: 0.2 },
            { id: 'intern', name: 'Intern', cost: 100, cps: 1.2 },
            { id: 'press', name: 'French Press', cost: 1100, cps: 8 },
            { id: 'moka', name: 'Moka Pot', cost: 12000, cps: 45 },
            { id: 'espresso', name: 'Espresso Unit', cost: 130000, cps: 210 },
            { id: 'truck', name: 'Coffee Truck', cost: 1400000, cps: 1100 },
            { id: 'cafe', name: 'Street Cafe', cost: 20000000, cps: 7500 },
            { id: 'roastery', name: 'Bulk Roastery', cost: 350000000, cps: 42000 },
            { id: 'island', name: 'Java Island', cost: 5000000000, cps: 250000 },
            { id: 'ship', name: 'Cargo Freighter', cost: 75000000000, cps: 1800000 },
            { id: 'singularity', name: 'Caffeine Rift', cost: 1000000000000, cps: 12000000 }
        ];

        const MILESTONES = [
            { id: 'm1', name: 'Wake Up', req: 1000, reward: '1.2x Click Power' },
            { id: 'm2', name: 'Local Hero', req: 50000, reward: '+5% CPS' },
            { id: 'm3', name: 'Coffee Mogul', req: 1000000, reward: 'Unlock Prestige' }
        ];

        // --- State ---
        let state = {
            beans: 0,
            lifetime: 0,
            cps: 0,
            aroma: 0,
            buyQty: 1,
            inventory: {},
            milestones: [],
            relics: []
        };

        // --- Logic ---
        function calculateCps() {
            let base = 0;
            ITEMS.forEach(i => base += (state.inventory[i.id] || 0) * i.cps);
            let multi = 1 + (state.aroma * 0.02);
            state.cps = base * multi;
            return state.cps;
        }

        function getCost(item, qty) {
            let current = state.inventory[item.id] || 0;
            if (qty === 'MAX') {
                qty = Math.floor(Math.log(((state.beans * (1.15 - 1)) / (item.cost * Math.pow(1.15, current))) + 1) / Math.log(1.15));
                if (qty < 1) return { cost: item.cost * Math.pow(1.15, current), qty: 1 };
                return { cost: (item.cost * (Math.pow(1.15, current) * (Math.pow(1.15, qty) - 1))) / (1.15 - 1), qty: qty };
            }
            let total = 0;
            for(let i=0; i<qty; i++) total += item.cost * Math.pow(1.15, current + i);
            return { cost: total, qty: qty };
        }

        function buy(id) {
            const item = ITEMS.find(i => i.id === id);
            const { cost, qty } = getCost(item, state.buyQty);
            
            if (state.beans >= cost) {
                state.beans -= cost;
                state.inventory[id] = (state.inventory[id] || 0) + qty;
                render();
            } else {
                toast();
            }
        }

        function render() {
            document.getElementById('beans').innerText = Math.floor(state.beans).toLocaleString();
            document.getElementById('cps').innerText = calculateCps().toLocaleString(undefined, {maximumFractionDigits:1});
            document.getElementById('aroma').innerText = state.aroma;
            document.getElementById('multi').innerText = (1 + state.aroma * 0.02).toFixed(2) + 'x';
            
            // Potential Aroma
            let pot = Math.floor(Math.sqrt(state.lifetime / 1000000));
            document.getElementById('next-aroma').innerText = Math.max(0, pot - state.aroma);

            // Shop
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            ITEMS.forEach(i => {
                const { cost, qty } = getCost(i, state.buyQty);
                const locked = state.lifetime < i.cost * 0.5;
                if (locked) return;
                
                const div = document.createElement('div');
                div.className = `card ${state.beans >= cost ? 'can-buy' : ''}`;
                div.onclick = () => buy(i.id);
                div.innerHTML = `
                    <div class="card-info">
                        <b>${i.name} [${state.inventory[i.id] || 0}]</b>
                        <i>+${i.cps} CPS each</i>
                    </div>
                    <div class="card-cost" style="color:${state.beans >= cost ? 'var(--secondary)' : 'var(--accent)'}">
                        ☕ ${Math.floor(cost).toLocaleString()}
                    </div>
                `;
                list.appendChild(div);
            });

            // Milestones
            const mList = document.getElementById('m-list');
            mList.innerHTML = '';
            MILESTONES.forEach(m => {
                const done = state.lifetime >= m.req;
                mList.innerHTML += `<div class="m-card ${done?'done':''}"><b>${m.name}</b><br>${m.reward} (${m.req.toLocaleString()} beans)</div>`;
            });
        }

        function prestige() {
            let pot = Math.floor(Math.sqrt(state.lifetime / 1000000));
            let diff = pot - state.aroma;
            if (diff <= 0) {
                alert("Need more lifetime beans! Reach 1 Million for your first point.");
                return;
            }
            if (confirm(`Reset all beans and shops for ${diff} Aroma Points?`)) {
                state.aroma = pot;
                state.beans = 0;
                state.inventory = {};
                ITEMS.forEach(i => state.inventory[i.id] = 0);
                save();
                render();
            }
        }

        // --- Helpers ---
        function setTab(id) {
            document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pane-' + id).classList.add('active');
            event.target.classList.add('active');
        }

        function setQty(q) {
            state.buyQty = q;
            document.querySelectorAll('#pane-shop .tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function toast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1000);
        }

        document.getElementById('cup-wrapper').addEventListener('touchstart', (e) => {
            e.preventDefault(); // Extra protection against zoom
            let clickPwr = (1 + (calculateCps() * 0.05)) * (state.lifetime > 1000 ? 1.2 : 1);
            state.beans += clickPwr;
            state.lifetime += clickPwr;
            
            const p = document.createElement('div');
            p.className = 'pop';
            p.style.left = e.touches[0].clientX + 'px';
            p.style.top = e.touches[0].clientY + 'px';
            p.innerText = '☕';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            render();
        });

        function save() { localStorage.setItem('CoffeeEmpire_v5', JSON.stringify(state)); }
        function load() {
            const s = localStorage.getItem('CoffeeEmpire_v5');
            if (s) state = JSON.parse(s);
        }

        // --- Loop ---
        load();
        setInterval(() => {
            let gain = calculateCps() / 10;
            state.beans += gain;
            state.lifetime += gain;
            render();
        }, 100);
        setInterval(save, 10000);
        render();

    </script>
</body>
</html>
