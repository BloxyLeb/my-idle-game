<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idle Tycoon - Complete Professional Edition</title>
    
    <style>
        /* 
         * ==========================================================
         * 1. GLOBAL VARIABLES & RESET
         * ==========================================================
         */
        :root { 
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --accent-green: #10b981; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --shadow-depth: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 480px; 
            width: 100%;
        }

        /* 
         * ==========================================================
         * 2. UI COMPONENTS: CARDS & BUTTONS
         * ==========================================================
         */
        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            border: var(--card-border);
            box-shadow: var(--shadow-depth); 
            margin-bottom: 20px;
        }

        .action-button { 
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; 
            border: none; 
            width: 100%; 
            padding: 22px; 
            font-size: 20px; 
            font-weight: 800; 
            border-radius: 16px; 
            cursor: pointer; 
            box-shadow: 0 10px 15px rgba(16, 185, 129, 0.3);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            margin-bottom: 20px;
        }

        .action-button:active { 
            transform: scale(0.97); 
            box-shadow: none;
        }

        .upgrade-row { 
            background: #252d3a; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            position: relative; 
            overflow: hidden; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: background 0.2s ease;
        }

        .upgrade-row:hover { background: #2d3748; }

        /* 
         * ==========================================================
         * 3. ANIMATIONS & MODALS
         * ==========================================================
         */
        .bar-bg { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: #1e293b; 
        }

        .bar-fill { 
            height: 100%; 
            background: var(--accent-green); 
            width: 0%; 
            transition: width 0.3s ease; 
        }

        #settings-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 999; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            opacity: 0; 
            visibility: hidden; 
            transition: 0.3s ease;
        }

        #settings-overlay.active { 
            opacity: 1; 
            visibility: visible; 
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Section -->
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="margin:0; font-size: 22px; opacity: 0.9;">OFFICE TYCOON</h1>
            <div onclick="toggleSettings(true)" style="cursor:pointer; color:var(--text-muted); font-weight: 600;">SETTINGS</div>
        </header>

        <!-- Stats Display -->
        <div class="card" style="text-align:center;">
            <div id="money-display" style="font-size: 48px; font-weight: 900; color: var(--accent-green);">$0</div>
            <div id="mps-display" class="text-muted">Income: $0/sec</div>
        </div>
        
        <!-- Interaction -->
        <button class="action-button" onclick="handleManualClick(event)">MINE CAPITAL</button>

        <!-- Shop Section -->
        <h3 style="margin: 20px 0 10px 0;">Office Expansion</h3>
        <div id="shop-container">
            <!-- Intern Upgrade -->
            <div class="upgrade-row" onclick="purchaseUpgrade('intern')">
                <div><strong>Intern</strong><br><span class="text-muted">Level <span id="count-intern">0</span></span></div>
                <div id="cost-intern" class="text-accent" style="font-weight:700;">$10</div>
                <div class="bar-bg"><div class="bar-fill" id="bar-intern"></div></div>
            </div>
            <!-- Auto-Miner Upgrade -->
            <div class="upgrade-row" onclick="purchaseUpgrade('auto')">
                <div><strong>Auto-Miner</strong><br><span class="text-muted">Level <span id="count-auto">0</span></span></div>
                <div id="cost-auto" class="text-accent" style="font-weight:700;">$50</div>
                <div class="bar-bg"><div class="bar-fill" id="bar-auto"></div></div>
            </div>
            <!-- Factory Upgrade -->
            <div class="upgrade-row" onclick="purchaseUpgrade('factory')">
                <div><strong>Factory</strong><br><span class="text-muted">Level <span id="count-factory">0</span></span></div>
                <div id="cost-factory" class="text-accent" style="font-weight:700;">$500</div>
                <div class="bar-bg"><div class="bar-fill" id="bar-factory"></div></div>
            </div>
            <!-- Office Upgrade -->
            <div class="upgrade-row" onclick="purchaseUpgrade('office')">
                <div><strong>Office Complex</strong><br><span class="text-muted">Level <span id="count-office">0</span></span></div>
                <div id="cost-office" class="text-accent" style="font-weight:700;">$2,500</div>
                <div class="bar-bg"><div class="bar-fill" id="bar-office"></div></div>
            </div>
        </div>

        <!-- Prestige Section -->
        <div class="card">
            <h3 style="margin-top:0;">Career Prestige</h3>
            <p style="font-size:14px; color: var(--text-muted);">Lifetime Earnings: <span id="total-earnings" style="color:white;">$0</span></p>
            <button id="prestige-btn" onclick="initiatePrestige()" style="width:100%; padding:14px; border-radius:10px; border:none; background:var(--danger); color:white; font-weight:bold; cursor:pointer;">PRESTIGE (Locked)</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-overlay">
        <div class="card" style="width: 85%; text-align: center;">
            <h3 style="margin-top:0;">Game Settings</h3>
            <p style="color:var(--text-muted);">Auto-Save is running in the background.</p>
            <button onclick="toggleSettings(false)" style="padding:12px 24px; background:var(--accent-green); border:none; border-radius:8px; cursor:pointer; font-weight:bold; color:black;">CLOSE MENU</button>
        </div>
    </div>

    <script>
        /**
         * Game Configuration State
         */
        let state = {
            money: 0, 
            perClick: 1, 
            perSecond: 0, 
            totalEarnings: 0, 
            prestigeMultiplier: 1.0,
            costs: { intern: 10, auto: 50, factory: 500, office: 2500 },
            counts: { intern: 0, auto: 0, factory: 0, office: 0 }
        };

        /**
         * Toggles the Settings Modal Visibility
         * @param {boolean} show - Whether to show the overlay
         */
        function toggleSettings(show) {
            const overlay = document.getElementById('settings-overlay');
            if(show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        /**
         * Handles the manual "Mine Capital" button click event
         * @param {Event} e - The click event object
         */
        function handleManualClick(e) {
            let income = Math.ceil(state.perClick * state.prestigeMultiplier);
            state.money += income;
            state.totalEarnings += income;
            updateUI();
        }

        /**
         * Logic to purchase and upgrade facilities
         * @param {string} type - The key of the building being purchased
         */
        function purchaseUpgrade(type) {
            if (state.money >= state.costs[type]) {
                // Deduct cost
                state.money -= state.costs[type];
                state.counts[type]++;
                
                // Income Scaling Logic
                if (type === 'intern') state.perClick += 1;
                if (type === 'auto') state.perSecond += 2;
                if (type === 'factory') state.perSecond += 10;
                if (type === 'office') state.perSecond += 50;
                
                // Increase next cost
                state.costs[type] = Math.floor(state.costs[type] * 1.25);
                
                updateUI();
            }
        }

        /**
         * Refreshes the DOM elements, calculates progress bars, and saves state
         */
        function updateUI() {
            // Update Text Displays
            document.getElementById('money-display').innerText = '$' + Math.floor(state.money).toLocaleString();
            document.getElementById('mps-display').innerText = `Income: $${Math.floor(state.perSecond * state.prestigeMultiplier).toLocaleString()}/sec`;
            document.getElementById('total-earnings').innerText = '$' + Math.floor(state.totalEarnings).toLocaleString();
            
            // Loop through building types to sync UI
            for(let key in state.counts) {
                document.getElementById(`count-${key}`).innerText = state.counts[key];
                document.getElementById(`cost-${key}`).innerText = '$' + state.costs[key].toLocaleString();
                
                // Calculate and update progress bar
                let percent = (state.money / state.costs[key]) * 100;
                let bar = document.getElementById(`bar-${key}`);
                if(bar) {
                    bar.style.width = Math.min(percent, 100) + '%';
                }
            }
            
            // Update Prestige Button State
            const btn = document.getElementById('prestige-btn');
            const canPrestige = state.totalEarnings >= 1000000;
            btn.style.opacity = canPrestige ? "1" : "0.5";
            btn.style.cursor = canPrestige ? "pointer" : "not-allowed";
            btn.innerText = canPrestige ? "PRESTIGE NOW" : "PRESTIGE (Need $1M)";
            
            // Persist to storage
            saveGame();
        }

        /**
         * Saves current state to localStorage
         */
        function saveGame() {
            localStorage.setItem('tycoonSave', JSON.stringify(state));
        }

        /**
         * Prestige Reset Logic
         */
        function initiatePrestige() {
            if (state.totalEarnings >= 1000000 && confirm("Reset all progress for a permanent 0.5x multiplier?")) {
                // Apply prestige bonus
                state.prestigeMultiplier += 0.5;
                
                // Reset stats
                state.money = 0; 
                state.perClick = 1; 
                state.perSecond = 0; 
                state.totalEarnings = 0;
                state.costs = { intern: 10, auto: 50, factory: 500, office: 2500 };
                state.counts = { intern: 0, auto: 0, factory: 0, office: 0 };
                
                updateUI();
            }
        }

        /**
         * Bootloader: Initializes local storage and starts the game loop
         */
        window.onload = () => {
            const savedData = localStorage.getItem('tycoonSave');
            if (savedData) {
                try {
                    state = JSON.parse(savedData);
                } catch (e) {
                    console.error("Failed to load save data", e);
                }
            }
            
            // Main Game Loop: Runs every second
            setInterval(() => {
                state.money += (state.perSecond * state.prestigeMultiplier);
                state.totalEarnings += (state.perSecond * state.prestigeMultiplier);
                updateUI();
            }, 1000);
            
            updateUI();
        };
    </script>
</body>
</html>
