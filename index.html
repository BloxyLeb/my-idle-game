<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idle Tycoon</title>
    <style>
        :root { --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; user-select: none; }
        .container { max-width: 400px; margin: 0 auto; }

        /* Settings Modal - Animated */
        #settings-overlay { 
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; box-sizing: border-box;
            opacity: 0; visibility: hidden; transition: 0.3s ease; align-items: center; justify-content: center;
        }
        #settings-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: var(--panel); padding: 25px; border-radius: 20px; text-align: left; 
            border: 2px solid var(--accent); width: 100%; max-width: 300px;
            transform: translateY(50px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #settings-overlay.active .modal-content { transform: translateY(0); }
        
        /* Floating Pop Effect */
        .floating-text { position: fixed; pointer-events: none; font-weight: 900; font-size: 24px; z-index: 9999; text-shadow: 0 0 5px black; animation: popEffect 0.8s ease-out forwards; }
        @keyframes popEffect { 
            0% { transform: translateY(0) scale(0.5); opacity: 1; } 
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; } 
        }
        
        /* UI Elements */
        #main-display { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .settings-btn { background: #2c3e50; border: 1px solid var(--accent); color: var(--accent); padding: 8px; width: 100%; margin-bottom: 15px; border-radius: 8px; font-weight: bold; }
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.1s; }
        #clickBtn { background-color: var(--accent); color: var(--bg); padding: 20px; width: 100%; font-size: 18px; margin-bottom: 20px; }
        .upgrade-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f3460; color: white; display: flex; justify-content: space-between; }
        .dashboard { background: rgba(15, 52, 96, 0.6); border-radius: 12px; padding: 15px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Idle Tycoon</h1>
        <button class="settings-btn" onclick="toggleSettings()">⚙️ SETTINGS</button>
        
        <div id="main-display">
            <div id="money" style="font-size: 32px; color: var(--accent);">$0</div>
            <div id="mps">Income: 0/sec</div>
        </div>
        
        <button id="clickBtn" onclick="clickMoney(event)">MINE MONEY</button>

        <div id="shop">
            <button class="upgrade-btn" onclick="buyUpgrade('intern')">Intern <span id="cost-intern">$10</span></button>
            <button class="upgrade-btn" onclick="buyUpgrade('auto')">Auto-Miner <span id="cost-auto">$50</span></button>
        </div>

        <div class="dashboard">
            <h3>Dashboard</h3>
            <p id="multiplier">Multiplier: 1.0x</p>
            <p id="ach-list">Achievements: None</p>
            <button id="prestigeBtn" onclick="prestige()" style="background:#b91c1c; color:white; width:100%; padding:10px;">PRESTIGE (Locked)</button>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="modal-content">
            <h3>Settings</h3>
            <label><input type="checkbox" id="buyMaxToggle"> Buy Max Mode</label><br><br>
            <label><input type="checkbox" id="soundToggle" checked> Enable Sounds</label><br><br>
            <button onclick="toggleSettings()" style="width:100%; padding:10px; background:var(--accent);">CLOSE</button>
        </div>
    </div>

    <script>
        let money = 0, perClick = 1, perSecond = 0, lastSaved = Date.now(), totalEarnings = 0;
        let costs = { intern: 10, auto: 50 };

        function toggleSettings() {
            const el = document.getElementById('settings-overlay');
            el.classList.toggle('active');
        }

        // Pop effect
        function spawnFloatingText(event, amount) {
            let float = document.createElement('div');
            float.className = 'floating-text';
            float.innerText = `+$${amount}`;
            float.style.left = (event.clientX || 200) + 'px';
            float.style.top = (event.clientY || 300) + 'px';
            float.style.color = `hsl(${Math.random() * 360}, 80%, 70%)`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 1000);
        }

        function clickMoney(event) {
            money += perClick;
            totalEarnings += perClick;
            spawnFloatingText(event, perClick);
            if(document.getElementById('soundToggle').checked) playClickSound();
            updateDisplay();
        }

        function buyUpgrade(type) {
            if (money >= costs[type]) {
                money -= costs[type];
                if (type === 'intern') perClick++;
                if (type === 'auto') perSecond++;
                costs[type] = Math.floor(costs[type] * 1.15);
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + Math.floor(money);
            document.getElementById('mps').innerText = `Income: ${perSecond}/sec`;
            for(let t in costs) document.getElementById(`cost-${t}`).innerText = `$${costs[t]}`;
            
            let canPrestige = totalEarnings >= 1000000;
            document.getElementById('prestigeBtn').disabled = !canPrestige;
            document.getElementById('prestigeBtn').innerText = canPrestige ? "PRESTIGE NOW" : "PRESTIGE (Locked)";
            
            saveGame();
        }

        function saveGame() {
            localStorage.setItem('tycoonSave', JSON.stringify({ money, perClick, perSecond, costs, lastSaved: Date.now(), totalEarnings }));
        }

        function playClickSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.frequency.value = 600;
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.05);
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('tycoonSave'));
            if (saved) {
                let secondsPassed = (Date.now() - saved.lastSaved) / 1000;
                let offlineCash = Math.floor(secondsPassed * saved.perSecond);
                money = saved.money + offlineCash;
                totalEarnings = (saved.totalEarnings || 0) + offlineCash;
                perClick = saved.perClick; perSecond = saved.perSecond; costs = saved.costs;
            }
            setInterval(() => { money += perSecond; totalEarnings += perSecond; updateDisplay(); }, 1000);
        };
        
        function prestige() { if(confirm("Reset?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
