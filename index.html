<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idle Tycoon - Professional Edition</title>
    
    <style>
        /* * ==========================================================
         * SYSTEM: GLOBAL VARIABLES & RESET
         * ==========================================================
         */
        :root { 
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --accent-green: #10b981; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --card-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            user-select: none; 
            display: flex;
            justify-content: center;
        }

        .container { 
            max-width: 480px; 
            width: 100%;
        }

        /* * ==========================================================
         * UI COMPONENTS: CARDS & BUTTONS
         * ==========================================================
         */
        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            border: var(--card-border);
            box-shadow: var(--shadow-soft);
            margin-bottom: 20px;
            transition: transform 0.2s ease;
        }

        .action-button { 
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; 
            border: none; 
            width: 100%; 
            padding: 22px; 
            font-size: 20px; 
            font-weight: 800; 
            border-radius: 16px; 
            cursor: pointer; 
            box-shadow: 0 10px 15px rgba(16, 185, 129, 0.2);
            transition: all 0.15s ease;
            margin-bottom: 20px;
        }

        .action-button:active { 
            transform: scale(0.96); 
        }

        .upgrade-row { 
            background: #252d3a; 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            cursor: pointer; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: background 0.2s;
        }

        .upgrade-row:hover { background: #2d3748; }

        /* * ==========================================================
         * UTILITY CLASSES
         * ==========================================================
         */
        .text-accent { color: var(--accent-green); font-weight: 700; }
        .text-muted { color: var(--text-muted); font-size: 14px; }
        .achievement-pill { 
            background: var(--accent-green); 
            color: black; 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 800; 
            display: inline-block; 
            margin-right: 5px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="margin:0; font-size: 22px; opacity: 0.9;">OFFICE TYCOON</h1>
            <div onclick="alert('Auto-Save is running')" style="cursor:pointer; color:var(--text-muted);">Settings</div>
        </header>

        <div class="card" style="text-align:center;">
            <div id="money-display" style="font-size: 48px; font-weight: 900; color: var(--accent-green);">$0</div>
            <div id="mps-display" class="text-muted">Income: 0/sec</div>
        </div>
        
        <button class="action-button" onclick="handleManualClick(event)">MINE CAPITAL</button>

        <h3 style="margin: 20px 0 10px 0;">Office Expansion</h3>
        <div id="shop-container">
            <div class="upgrade-row" onclick="purchaseUpgrade('intern')">
                <div><strong>Intern</strong><br><span class="text-muted">Level <span id="count-intern">0</span></span></div>
                <div id="cost-intern" class="text-accent">$10</div>
            </div>
            <div class="upgrade-row" onclick="purchaseUpgrade('auto')">
                <div><strong>Auto-Miner</strong><br><span class="text-muted">Level <span id="count-auto">0</span></span></div>
                <div id="cost-auto" class="text-accent">$50</div>
            </div>
            <div class="upgrade-row" onclick="purchaseUpgrade('factory')">
                <div><strong>Factory</strong><br><span class="text-muted">Level <span id="count-factory">0</span></span></div>
                <div id="cost-factory" class="text-accent">$500</div>
            </div>
            <div class="upgrade-row" onclick="purchaseUpgrade('office')">
                <div><strong>Office Complex</strong><br><span class="text-muted">Level <span id="count-office">0</span></span></div>
                <div id="cost-office" class="text-accent">$2,500</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">Career Milestones</h3>
            <div id="achievements-list" class="text-muted">Keep grinding to unlock achievements...</div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;">Prestige System</h3>
            <p style="font-size:14px; margin-bottom:15px;">Total Lifetime Earnings: <span id="total-earnings">$0</span></p>
            <button id="prestige-btn" onclick="initiatePrestige()" style="width:100%; padding:14px; border-radius:10px; border:none; background:var(--danger); color:white; font-weight:bold; cursor:pointer;">PRESTIGE (Locked)</button>
        </div>
    </div>

    <script>
        /* * ==========================================================
         * GAME STATE INITIALIZATION
         * ==========================================================
         */
        let state = {
            money: 0,
            perClick: 1,
            perSecond: 0,
            totalEarnings: 0,
            prestigeMultiplier: 1.0,
            costs: { intern: 10, auto: 50, factory: 500, office: 2500 },
            counts: { intern: 0, auto: 0, factory: 0, office: 0 }
        };

        let audioContext = null;

        /**
         * Initializes audio context on user interaction (Required by browsers)
         */
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        /**
         * Plays a synthesized click sound
         */
        function playClickSound() {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 500;
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        /**
         * Formats numbers to currency strings
         */
        function formatMoney(num) {
            return '$' + Math.floor(num).toLocaleString();
        }

        /**
         * Handles the manual interaction (The "Mine" button)
         */
        function handleManualClick(event) {
            let income = Math.ceil(state.perClick * state.prestigeMultiplier);
            state.money += income;
            state.totalEarnings += income;
            playClickSound();
            updateUI();
        }

        /**
         * Handles purchasing upgrades
         */
        function purchaseUpgrade(type) {
            if (state.money >= state.costs[type]) {
                state.money -= state.costs[type];
                state.counts[type]++;
                
                // Update stats based on type
                if (type === 'intern') state.perClick += 1;
                if (type === 'auto') state.perSecond += 2;
                if (type === 'factory') state.perSecond += 10;
                if (type === 'office') state.perSecond += 50;
                
                // Increase cost
                state.costs[type] = Math.floor(state.costs[type] * 1.25);
                updateUI();
            }
        }

        /**
         * Calculates if milestones are met
         */
        function updateAchievements() {
            const container = document.getElementById('achievements-list');
            let achs = [];
            if (state.totalEarnings >= 1000000) achs.push("Millionaire");
            if (state.counts.office >= 1) achs.push("CEO");
            
            if (achs.length > 0) {
                container.innerHTML = achs.map(a => `<span class="achievement-pill">${a}</span>`).join('');
            }
        }

        /**
         * Central UI update loop
         */
        function updateUI() {
            document.getElementById('money-display').innerText = formatMoney(state.money);
            document.getElementById('mps-display').innerText = `Income: ${formatMoney(state.perSecond * state.prestigeMultiplier)}/sec`;
            document.getElementById('total-earnings').innerText = formatMoney(state.totalEarnings);
            
            // Sync counts and costs
            for(let key in state.counts) {
                document.getElementById(`count-${key}`).innerText = state.counts[key];
                document.getElementById(`cost-${key}`).innerText = formatMoney(state.costs[key]);
            }
            
            // Sync Prestige Button
            const btn = document.getElementById('prestige-btn');
            const canPrestige = state.totalEarnings >= 1000000;
            btn.style.opacity = canPrestige ? "1" : "0.5";
            btn.style.cursor = canPrestige ? "pointer" : "not-allowed";
            btn.innerText = canPrestige ? "PRESTIGE NOW" : "PRESTIGE (Need $1M)";
            
            updateAchievements();
            saveGame();
        }

        /**
         * Save game to local storage
         */
        function saveGame() {
            localStorage.setItem('tycoonSave', JSON.stringify(state));
        }

        /**
         * Prestige mechanics
         */
        function initiatePrestige() {
            if (state.totalEarnings >= 1000000) {
                if (confirm("Reset progress for a permanent 0.5x multiplier?")) {
                    state.prestigeMultiplier += 0.5;
                    state.money = 0; state.perClick = 1; state.perSecond = 0; state.totalEarnings = 0;
                    state.costs = { intern: 10, auto: 50, factory: 500, office: 2500 };
                    state.counts = { intern: 0, auto: 0, factory: 0, office: 0 };
                    updateUI();
                }
            }
        }

        /**
         * Bootloader
         */
        window.onload = () => {
            const saved = localStorage.getItem('tycoonSave');
            if (saved) {
                state = JSON.parse(saved);
            }
            
            setInterval(() => {
                state.money += (state.perSecond * state.prestigeMultiplier);
                state.totalEarnings += (state.perSecond * state.prestigeMultiplier);
                updateUI();
            }, 1000);
            
            updateUI();
        };
    </script>
</body>
</html>
