<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffee Tycoon</title>
    <style>
        :root {
            --dark-coffee: #3e2723;
            --milk: #f5f5dc;
            --accent: #d2691e;
        }
        body {
            background: linear-gradient(135deg, #2c2420, #5d4037);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
        }
        #game-container {
            background: rgba(75, 54, 33, 0.9);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0 0 10px 0; font-size: 1.8rem; letter-spacing: 1px; }
        
        #coffee-display { font-size: 3rem; font-weight: bold; margin: 10px 0; color: #ffeb3b; }
        
        #brew-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle, #a1887f, #6d4c41);
            font-size: 60px;
            cursor: pointer;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        #brew-btn:active { transform: scale(0.9); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-buy {
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .floating-text {
            position: absolute;
            color: #ffeb3b;
            font-weight: bold;
            pointer-events: none;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: float 0.8s ease-out forwards;
        }
        @keyframes float {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-70px); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>☕ COFFEE TYCOON</h1>
        <div id="coffee-display">0</div>
        
        <button id="brew-btn">☕</button>
        
        <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 20px;">
            Baristas: <span id="barista-count">0</span> | Machines: <span id="machine-count">0</span>
        </div>
        
        <div class="upgrade-card">
            <div><strong>Barista</strong><br><small>+0.5/sec</small></div>
            <button class="btn-buy" id="hire-barista">Buy (15)</button>
        </div>
        <div class="upgrade-card">
            <div><strong>Machine</strong><br><small>+5/sec</small></div>
            <button class="btn-buy" id="buy-machine">Buy (100)</button>
        </div>
        <div class="upgrade-card">
            <div><strong>Grinder</strong><br><small>+1 click</small></div>
            <button class="btn-buy" id="buy-grinder">Buy (50)</button>
        </div>
    </div>

    <script>
        let coffee = 0, baristas = 0, machines = 0, clickPower = 1;
        let bCost = 15, mCost = 100, gCost = 50;

        function updateUI() {
            document.getElementById('coffee-display').innerText = Math.floor(coffee);
            document.getElementById('barista-count').innerText = baristas;
            document.getElementById('machine-count').innerText = machines;
            document.getElementById('hire-barista').innerText = `Buy (${bCost})`;
            document.getElementById('buy-machine').innerText = `Buy (${mCost})`;
            document.getElementById('buy-grinder').innerText = `Buy (${gCost})`;
        }

        document.getElementById('brew-btn').addEventListener('click', (e) => {
            coffee += clickPower;
            let div = document.createElement('div');
            div.className = 'floating-text';
            div.innerText = "+" + clickPower;
            div.style.left = (e.clientX || 150) + 'px';
            div.style.top = (e.clientY || 300) + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 800);
            updateUI();
        });

        document.getElementById('hire-barista').addEventListener('click', () => {
            if (coffee >= bCost) {
                coffee -= bCost; baristas++; bCost = Math.floor(bCost * 1.5); updateUI();
            }
        });

        document.getElementById('buy-machine').addEventListener('click', () => {
            if (coffee >= mCost) {
                coffee -= mCost; machines++; mCost = Math.floor(mCost * 1.8); updateUI();
            }
        });

        document.getElementById('buy-grinder').addEventListener('click', () => {
            if (coffee >= gCost) {
                coffee -= gCost; clickPower += 1; gCost = Math.floor(gCost * 2.5); updateUI();
            }
        });

        setInterval(() => { coffee += (baristas * 0.5) + (machines * 5); updateUI(); }, 1000);
        
        window.onload = () => {
            let save = JSON.parse(localStorage.getItem('coffeeSave'));
            if(save) {
                coffee = save.coffee; baristas = save.baristas; machines = save.machines;
                clickPower = save.clickPower || 1;
                bCost = save.bCost; mCost = save.mCost; gCost = save.gCost;
                updateUI();
            }
        };
        setInterval(() => localStorage.setItem('coffeeSave', JSON.stringify({coffee, baristas, machines, clickPower, bCost, mCost, gCost})), 2000);
    </script>
</body>
</html>
