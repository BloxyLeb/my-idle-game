<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background-color: #4CAF50; color: white; margin: 10px; }
        button:hover { background-color: #45a049; }
        #money { font-size: 50px; font-weight: bold; margin: 20px; color: #333; }
    </style>
</head>
<body>
    <h1>My Idle Game</h1>
    <div id="money">$0</div>
    
    <button onclick="clickMoney()">Click Me!</button>
    <br>
    <button onclick="buyUpgrade()">Hire Intern ($10)</button>

    <script>
        let money = 0;
        let multiplier = 1;

        function clickMoney() {
            money += multiplier;
            updateDisplay();
        }

        function buyUpgrade() {
            if (money >= 10) {
                money -= 10;
                multiplier += 1;
                updateDisplay();
            } else {
                alert("Need $10 to hire an intern!");
            }
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + money;
        }
    </script>
</body>
</html>
