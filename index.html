<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idle Tycoon</title>
    <style>
        :root { --bg: #1a1a2e; --panel: #16213e; --accent: #4ecca3; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; user-select: none; }
        .container { max-width: 400px; margin: 0 auto; position: relative; }

        /* Settings Modal - Animated */
        #settings-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            z-index: 1000; padding: 20px; box-sizing: border-box; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.3s ease; display: flex;
        }
        #settings-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: var(--panel); padding: 25px; border-radius: 20px; text-align: left; 
            border: 2px solid var(--accent); width: 90%; transform: translateY(50px); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #settings-overlay.active .modal-content { transform: translateY(0); }

        /* UI Elements */
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.1s; outline: none; }
        #clickBtn { background-color: var(--accent); color: var(--bg); padding: 20px; width: 100%; font-size: 20px; margin-bottom: 20px; box-shadow: 0 5px 0 #3db68f; }
        #clickBtn:active { transform: translateY(4px); box-shadow: none; }
        
        .upgrade-btn { width: 100%; padding: 14px; margin-bottom: 10px; background: #0f3460; color: white; display: flex; justify-content: space-between; border: 1px solid #1a1a2e; }
        .upgrade-btn:active { transform: scale(0.98); }
        
        /* Floating Pop Effect */
        .floating-text { position: fixed; pointer-events: none; font-weight: 900; font-size: 24px; z-index: 9999; text-shadow: 0 0 5px black; animation: popEffect 0.8s ease-out forwards; }
        @keyframes popEffect { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
        
        .dashboard { background: rgba(15, 52, 96, 0.6); border-radius: 12px; padding: 15px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Idle Tycoon</h1>
        <button onclick="toggleSettings()" style="background:#2c3e50; color:var(--accent); padding:10px; width:100%; margin-bottom:15px;">⚙️ SETTINGS</button>
        
        <div id="main-display" style="background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
            <div id="money" style="font-size: 32px; color: var(--accent);">$0</div>
            <div id="mps">Income: 0/sec</div>
        </div>
        
        <button id="clickBtn" onclick="clickMoney(event)">MINE MONEY</button>

        <div style="margin: 15px 0; text-align: right; color: var(--accent);">
            <label style="font-size: 14px; cursor: pointer;">
                <input type="checkbox" id="buyMaxToggle"> Buy Max
            </label>
        </div>

        <div id="shop">
            <button class="upgrade-btn" onclick="buyUpgrade('intern')">Intern <span id="cost-intern">$10</span></button>
            <button class="upgrade-btn" onclick="buyUpgrade('auto')">Auto-Miner <span id="cost-auto">$50</span></button>
        </div>

        <div class="dashboard">
            <h3>Dashboard</h3>
            <p id="multiplier">Multiplier: 1.0x</p>
            <button id="prestigeBtn" onclick="prestige()" style="background:#b91c1c; color:white; width:100%; padding:12px;">PRESTIGE (Locked)</button>
        </div>
    </div>

    <div id="settings-overlay">
        <div class="modal-content">
            <h3>Settings</h3>
            <label><input type="checkbox" id="soundToggle" checked> Enable Sounds</label><br><br>
            <button onclick="toggleSettings()" style="width:100%; padding:10px; background:var(--accent);">CLOSE</button>
        </div>
    </div>

    <script>
        let money = 0, perClick = 1, perSecond = 0, totalEarnings = 0, prestigeMultiplier = 1.0;
        let costs = { intern: 10, auto: 50 };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleSettings() { document.getElementById('settings-overlay').classList.toggle('active'); }

        function playClickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 600;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function spawnFloatingText(event, amount) {
            let float = document.createElement('div');
            float.className = 'floating-text';
            float.innerText = `+$${Math.floor(amount)}`;
            float.style.left = (event.clientX || 200) + 'px';
            float.style.top = (event.clientY || 300) + 'px';
            float.style.color = `hsl(${Math.random() * 360}, 80%, 70%)`;
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 1000);
        }

        function clickMoney(event) {
            let income = Math.ceil(perClick * prestigeMultiplier);
            money += income; totalEarnings += income;
            spawnFloatingText(event, income);
            if(document.getElementById('soundToggle').checked) playClickSound();
            updateDisplay();
        }

        function buyUpgrade(type) {
            let isBuyMax = document.getElementById('buyMaxToggle').checked;
            
            if (isBuyMax) {
                while (money >= costs[type]) {
                    money -= costs[type];
                    if (type === 'intern') perClick++;
                    if (type === 'auto') perSecond++;
                    costs[type] = Math.floor(costs[type] * 1.15);
                }
            } else {
                if (money >= costs[type]) {
                    money -= costs[type];
                    if (type === 'intern') perClick++;
                    if (type === 'auto') perSecond++;
                    costs[type] = Math.floor(costs[type] * 1.15);
                }
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + Math.floor(money);
            document.getElementById('mps').innerText = `Income: ${Math.floor(perSecond * prestigeMultiplier)}/sec`;
            document.getElementById('multiplier').innerText = `Multiplier: ${prestigeMultiplier.toFixed(1)}x`;
            for(let t in costs) document.getElementById(`cost-${t}`).innerText = `$${costs[t]}`;
            
            let canPrestige = totalEarnings >= 1000000;
            let btn = document.getElementById('prestigeBtn');
            btn.disabled = !canPrestige;
            btn.innerText = canPrestige ? "PRESTIGE NOW" : "PRESTIGE (Locked)";
            
            saveGame();
        }

        function saveGame() {
            localStorage.setItem('tycoonSave', JSON.stringify({ money, perClick, perSecond, costs, lastSaved: Date.now(), totalEarnings, prestigeMultiplier }));
        }

        function prestige() { 
            if(confirm("Reset all progress for a permanent +0.5x multiplier?")) { 
                prestigeMultiplier += 0.5;
                money = 0; perClick = 1; perSecond = 0; totalEarnings = 0; costs = { intern: 10, auto: 50 };
                saveGame(); location.reload(); 
            } 
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('tycoonSave'));
            if (saved) {
                let secondsPassed = (Date.now() - saved.lastSaved) / 1000;
                let offlineCash = Math.floor(secondsPassed * saved.perSecond * (saved.prestigeMultiplier || 1.0));
                money = saved.money + offlineCash;
                totalEarnings = (saved.totalEarnings || 0) + offlineCash;
                perClick = saved.perClick; perSecond = saved.perSecond; costs = saved.costs; prestigeMultiplier = saved.prestigeMultiplier || 1.0;
            }
            setInterval(() => { money += (perSecond * prestigeMultiplier); totalEarnings += (perSecond * prestigeMultiplier); updateDisplay(); }, 1000);
        };
    </script>
</body>
</html>
