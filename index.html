<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { color: #4ecca3; }
        #stats { font-size: 24px; margin: 20px 0; background: #16213e; padding: 15px; border-radius: 10px; }
        #money { font-size: 40px; font-weight: bold; color: #4ecca3; }
        .button-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background-color: #0f3460; color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background-color: #333; color: #666; opacity: 0.6; }
        #clickBtn { background-color: #4ecca3; color: #1a1a2e; font-weight: bold; padding: 30px; font-size: 20px; transition: transform 0.1s; }
        #clickBtn:active { transform: scale(0.90); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Idle Tycoon</h1>
        <div id="stats">
            <div id="money">$0</div>
            <div style="font-size: 14px; color: #aaa;">Income: <span id="mps">0</span>/sec</div>
        </div>
        
        <div class="button-group">
            <button id="clickBtn" onclick="clickMoney()">MINE MONEY</button>
            <button id="btn-intern" onclick="buyUpgrade('intern')">Intern ($10)</button>
            <button id="btn-auto" onclick="buyUpgrade('auto')">Auto-Miner ($50)</button>
            <button id="btn-factory" onclick="buyUpgrade('factory')">Factory ($500)</button>
        </div>

        <div style="margin-top: 20px;">
            <button onclick="resetGame()" style="background-color: #a00; font-size: 10px;">Reset All Progress</button>
        </div>
    </div>

    <script>
        let money = 0, perClick = 1, perSecond = 0;
        let costs = { intern: 10, auto: 50, factory: 500 };

        window.onload = () => {
            const saved = localStorage.getItem('idleGameSave');
            if (saved) {
                const data = JSON.parse(saved);
                money = data.money; perClick = data.perClick; perSecond = data.perSecond; costs = data.costs;
            }
            updateDisplay();
        };

        function clickMoney() {
            money += perClick;
            updateDisplay();
        }

        function buyUpgrade(type) {
            if (money >= costs[type]) {
                money -= costs[type];
                if (type === 'intern') perClick += 1;
                if (type === 'auto') perSecond += 1;
                if (type === 'factory') perSecond += 10;
                
                costs[type] = Math.floor(costs[type] * 1.15); // Increase price by 15%
                updateDisplay();
                saveGame();
            }
        }

        function updateDisplay() {
            document.getElementById('money').innerText = '$' + Math.floor(money);
            document.getElementById('mps').innerText = perSecond;
            document.getElementById('btn-intern').innerText = `Hire Intern ($${costs.intern})`;
            document.getElementById('btn-auto').innerText = `Auto-Miner ($${costs.auto})`;
            document.getElementById('btn-factory').innerText = `Factory ($${costs.factory})`;
        }

        function saveGame() {
            localStorage.setItem('idleGameSave', JSON.stringify({ money, perClick, perSecond, costs }));
        }

        function resetGame() {
            if(confirm("Wipe all data?")) {
                localStorage.removeItem('idleGameSave');
                location.reload();
            }
        }

        setInterval(() => {
            money += perSecond;
            updateDisplay();
        }, 1000);
    </script>
</body>
</html>
